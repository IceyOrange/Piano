<body>
<script>
(function() {
  var t = JSON.parse(sessionStorage.getItem('pianoTransition') || '{}');
  if (t.to === 'portfolio.html' && t.variant === 'circle-reveal' && !sessionStorage.getItem('pianoTransitionPlayed')) {
    sessionStorage.setItem('pianoTransitionPlayed', 'true');
    var s = JSON.parse(sessionStorage.getItem('c3Origin') || '{}');
    var ox = s.x || '50%';
    var oy = s.y || '50%';
    // CSS animation on .page: starts clipped to 0, expands to 150%
    // Body bg (dark navy) shows outside the circle — warm page reveals from C3
    var st = document.createElement('style');
    st.id = 'circle-entry';
    st.textContent = '.page{animation:circleEntry .8s cubic-bezier(.4,0,.2,1) forwards}@keyframes circleEntry{from{clip-path:circle(0% at ' + ox + ' ' + oy + ')}to{clip-path:circle(150% at ' + ox + ' ' + oy + ')}}';
    document.documentElement.appendChild(st);
    setTimeout(function() { st.remove(); }, 1200);
  }
})();
</script>
