<!DOCTYPE html>
<html lang="en">
<head>

  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/styles.css?v=80">

<body>
  <!-- Portrait Gate -->
  <div class="portrait-gate" aria-hidden="true">
    <div class="portrait-gate-inner">
      <svg class="portrait-gate-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="22" y="8" width="20" height="48" rx="2.5"/>
        <line x1="28" y1="51" x2="36" y2="51"/>
        <circle cx="32" cy="12.5" r="0.6" fill="currentColor" stroke="none"/>
      </svg>
      <p class="portrait-gate-text-zh">请横屏使用</p>
      <p class="portrait-gate-text-en">Rotate to landscape</p>
    </div>
  </div>

  <!-- Page Transition Overlay -->
  <div class="transition-overlay"></div>

  <!-- Page Header -->
  <header class="page-header">
    <div class="page-header-inner">

        <a href="experience.html">Experience</a>
        <a href="about.html" aria-current="page">About</a>
      </nav>
    </div>
  </header>

  <!-- About Page -->
  <div class="page page-warm">
    <div class="page-content">
      <div id="about-container" class="about-container">
        <!-- Hero: name / typewriter / handwriting / bio / social + avatar -->
        <div class="about-hero about-stagger">
          <div class="about-name"></div>
          <div class="about-typewriter">
            <span class="typewriter-text"></span>
          </div>
          <div class="about-handwriting">
            <span class="handwriting-text"></span>
          </div>
          <div class="about-bio"></div>
          <div class="about-social"></div>
          <div class="about-avatar">
            <img alt="">
          </div>
        </div>

        <!-- Photo Gallery -->
        <div class="about-photos">
          <div class="about-photo-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="js/data.js?v=9"></script>
  <script src="js/transitions.js?v=71"></script>
  <script src="js/nav.js?v=3"></script>
