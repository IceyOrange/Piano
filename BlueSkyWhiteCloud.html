<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>蓝天白云</title>
    <meta name="description" content="某个练完鼓的下午，在通向海边沙滩的小路上，耳机里响起了张悬的《蓝天白云》。">
    <meta property="og:type" content="website">
    <meta property="og:title" content="蓝天白云">
    <meta property="og:description" content="某个练完鼓的下午，在通向海边沙滩的小路上，耳机里响起了张悬的《蓝天白云》。">
    <meta name="theme-color" content="#87ceeb">
    <link id="gfont" href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        // Google Fonts 国内镜像回退
        (function() {
            if (!document.fonts || typeof document.fonts.check !== 'function') return;
            setTimeout(function() {
                try {
                    if (document.fonts.check('1em "Noto Sans SC"')) return;
                } catch (e) { return; }
                var link = document.getElementById('gfont');
                if (link) {
                    link.href = 'https://fonts.loli.net/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap';
                }
            }, 3000);
        })();
    </script>
    <style>
        /* ============================================
           基础重置
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        html, body {
            width: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
        }

        :root {
            /* 太阳位置和星空显露程度，由 JS 更新 */
            --sun-x: 0.3;
            --sun-y: -0.1;
            --stars-reveal: 0;
            /* 设计 token */
            --color-day-text: rgba(50, 55, 70, 0.9);
            --color-night-text: rgba(255, 255, 255, 0.98);
            --color-focus-day: rgba(120, 140, 255, 0.5);
            --color-focus-night: rgba(200, 210, 255, 0.5);
            --color-twilight-1: rgba(255, 200, 150, calc(var(--twilight, 0) * 0.35));
            --color-twilight-2: rgba(255, 160, 120, calc(var(--twilight, 0) * 0.18));
            --color-twilight-3: rgba(180, 140, 180, calc(var(--twilight, 0) * 0.1));
        }

        body {
            min-height: 400vh;
            font-family: "Noto Sans SC", "PingFang SC", "Hiragino Sans GB", sans-serif;
            background: #000;
        }

        /* ============================================
           天空视窗
           ============================================ */
        .sky-frame {
            position: fixed;
            inset: 0;
            width: 100vw;
            height: 100vh;
            opacity: 1;
        }

        /* 星空画布 - 全屏叠底，通过 opacity 控制显隐 */
        #stars-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 2;
            opacity: var(--stars-reveal, 0);
            transition: opacity 200ms ease-out;
        }

        /* 黑夜模式下 sky-frame 无需特殊处理 */
        .sky-frame:focus-visible {
            outline: 2px solid var(--color-focus-day);
            outline-offset: 3px;
        }

        body.night .sky-frame:focus-visible {
            outline: 2px solid var(--color-focus-night);
            outline-offset: 3px;
        }

        /* ============================================
           Canvas 层级 (z-index: 0-2)
           ============================================ */

        /* 天空画布 (WebGL) - z-index: 0 */
        #sky-canvas {
            width: 100%;
            height: 100%;
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 0;
        }

        /* 周围环境画布 - z-index: 1 */
        #surroundings-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            will-change: transform;
            z-index: 1;
            opacity: 0;
            transition: opacity 1000ms cubic-bezier(0.25, 1, 0.5, 1);
        }

        body.day #surroundings-canvas {
            opacity: 1;
        }

        /* 风和落叶动态覆盖层 - z-index: 15 */
        #wind-leaf-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            will-change: transform;
            z-index: 15;
            opacity: 0;
        }

        body.day #wind-leaf-canvas {
            opacity: 1;
        }

        /* pointer-events 由 JS 根据昼夜状态动态同步，不再依赖 body.night */
        #stars-canvas.interactive {
            pointer-events: auto;
            cursor: pointer;
        }

        /* ============================================
           日落光晕遮罩 - 随太阳位置动态变化
           使用大元素 + transform 平移 + opacity 替代渐变动态 alpha，
           避免 radial-gradient 逐帧重绘导致的全屏 repaint 掉帧
           ============================================ */
        .twilight-overlay {
            position: fixed;
            width: 200vmax;
            height: 200vmax;
            left: -50vmax;
            top: -50vmax;
            pointer-events: none;
            z-index: 50;
            will-change: transform, opacity;
            /* 渐变 alpha 固定，整体透明度由 opacity 控制，可利用 GPU 合成 */
            background: radial-gradient(
                ellipse 90% 90% at center,
                rgba(255, 200, 150, 0.35) 0%,
                rgba(255, 160, 120, 0.18) 20%,
                rgba(180, 140, 180, 0.1) 40%,
                transparent 70%
            );
            transform: translate(
                calc(var(--sun-x, 0.5) * 100vw),
                calc(var(--sun-y, 0.5) * 100vh)
            );
            opacity: var(--twilight, 0);
        }

        /* 飞鸟画布 - 全屏覆盖，让鸟儿能飞出画框 */
        #birds-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 20;
        }

        /* 时间提示 (默认隐藏) */
        .time-hint {
            display: none;
        }

        /* 减少运动偏好支持 */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }

        .sr-only {
            position: absolute;
            left: -9999px;
            width: 1px;
            height: 1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        /* ============================================
           引导提示
           ============================================ */
        .onboarding-hint {
            position: fixed;
            left: 50%;
            bottom: max(24px, env(safe-area-inset-bottom) + 8px);
            transform: translateX(-50%);
            z-index: 100;
            pointer-events: none;
            font-family: "Noto Sans SC", "PingFang SC", sans-serif;
            font-size: clamp(13.5px, 1.3vw, 16px);
            background: none;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            border-radius: 0;
            padding: 0;
            opacity: 0;
            transition: opacity 700ms cubic-bezier(0.25, 1, 0.5, 1);
            white-space: nowrap;
            letter-spacing: 0.08em;
            text-align: center;
            max-width: 90vw;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .onboarding-hint.visible {
            opacity: 1;
        }

        @media (prefers-reduced-motion: reduce) {
            .onboarding-hint {
                transition: none !important;
            }
        }

        /* 白天：柔和的深色调文字 + 浅投影，避免在亮蓝天中消失 */
        body.day .onboarding-hint {
            color: var(--color-day-text);
            text-shadow:
                0 1px 0 rgba(255, 255, 255, 0.35),
                0 2px 10px rgba(255, 255, 255, 0.25);
        }

        /* 夜晚：白色文字 + 暗色外发光，确保在深空中清晰 */
        body.night .onboarding-hint {
            color: var(--color-night-text);
            font-weight: 300;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-shadow:
                0 0 10px rgba(255, 255, 255, 0.45),
                0 0 28px rgba(255, 255, 255, 0.25);
        }

        /* ============================================
           页面渐入遮罩
           ============================================ */
        #page-intro {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #87ceeb;
            pointer-events: none;
            animation: introFadeOut 1.4s cubic-bezier(0.4, 0, 0.2, 1) 0.15s forwards;
        }

        @keyframes introFadeOut {
            from { opacity: 1; }
            to   { opacity: 0; }
        }

        /* ─── Mobile Landscape Rotation ─────────── */
        @media (max-width: 1024px) and (orientation: portrait) {
            html:has(body.landscape-page) {
                overflow: hidden;
                height: 100%;
                width: 100%;
            }
            body.landscape-page {
                width: 100vh;
                height: 100vw;
                position: fixed;
                top: calc((100vh - 100vw) / 2);
                left: calc((100vw - 100vh) / 2);
                transform-origin: center center;
                transform: rotate(90deg);
                overflow-x: hidden;
                overflow-y: auto;
                -webkit-overflow-scrolling: touch;
            }
            /* BlueSkyWhiteCloud: disable rotation, keep portrait layout for canvas */
            body.landscape-page:has(.sky-frame) {
                width: 100vw;
                height: 100vh;
                position: static;
                top: auto;
                left: auto;
                transform: none;
                overflow: hidden;
            }
        }
    </style>
</head>
<body class="landscape-page">
    <div id="page-intro" aria-hidden="true"></div>

    <!-- 天空全屏画框 -->
    <div class="sky-frame" id="skyFrame" tabindex="0" role="button" aria-label="天空视窗，点击进入与天空互动">
        <canvas id="sky-canvas" aria-label="昼夜天空背景"></canvas>
        <canvas id="surroundings-canvas" aria-label="周围环境装饰"></canvas>
    </div>

    <!-- 风与落叶动态覆盖层 -->
    <canvas id="wind-leaf-canvas" aria-hidden="true"></canvas>

    <!-- 飞鸟画布 - 全屏覆盖 -->
    <canvas id="birds-canvas" aria-hidden="true"></canvas>

    <!-- 星空画布 -->
    <canvas id="stars-canvas" aria-label="星空与流星"></canvas>

    <!-- 暮光过渡遮罩 -->
    <div class="twilight-overlay" aria-hidden="true"></div>

    <!-- 交互引导提示 -->
    <div class="onboarding-hint" id="idleHint" aria-hidden="true" style="display:none">
        <span id="idleHintText">点击天空，放飞一只飞鸟</span>
    </div>

    <script type="importmap" id="importmap-three">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>
    <script>
        // Three.js 国内镜像回退：若 jsdelivr 不可达，切换回 unpkg
        (function() {
            var primary = 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
            var fallback = 'https://unpkg.com/three@0.160.0/build/three.module.js';
            var map = document.getElementById('importmap-three');
            if (!map) return;
            var ac;
            try { ac = new AbortController(); } catch(e) { ac = null; }
            var fetchOpts = { method: 'HEAD', mode: 'no-cors' };
            if (ac) fetchOpts.signal = ac.signal;
            fetch(primary, fetchOpts)
                .catch(function() {
                    try {
                        map.textContent = JSON.stringify({ imports: { three: fallback } });
                    } catch(e) {}
                });
            if (ac) setTimeout(function() { try { ac.abort(); } catch(e) {} }, 2000);
        })();
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ============================================
        // 模块目录

        // ============================================
        // 对象池 - 用于复用流星、彗星、飞鸟等对象
        // ============================================
        class ObjectPool {
            constructor(factory, resetFn, initialSize = 10) {
                this.factory = factory;
                this.resetFn = resetFn;
                this.available = [];
                this.inUse = new Set();
                // 预创建初始对象
                for (let i = 0; i < initialSize; i++) {
                    this.available.push(this.factory());
                }
            }
            acquire(...args) {
                let obj = this.available.pop();
                if (!obj) {
                    obj = this.factory();
                }
                this.resetFn(obj, ...args);
                this.inUse.add(obj);
                obj._pool = this;
                return obj;
            }
            release(obj) {
                if (this.inUse.has(obj)) {
                    this.inUse.delete(obj);
                    this.available.push(obj);
                }
            }
        }

        // ============================================
        // 时间状态管理 - 基于太阳位置的连续过渡
        // ============================================
        // 太阳位置：从画面上方中央向右下角落下
        // 星空显露：从左上角随太阳落下而逐渐显现
        const TimeState = {
            progress: 0,
            isDay: true,
            sunPosition: { x: 0.3, y: -0.1 },
            starsReveal: 0,
            // 太阳轨迹模式: 'sunset'=左上→右下(日落), 'sunrise'=左下→右上(日出,模式A的对称)
            sunMode: 'sunset',
            // 脏检查缓存
            _lastSunX: '', _lastSunY: '', _lastStarsReveal: '', _lastTwilight: '', _wasDay: true,
            _hasRefreshedLeavesAtBottom: false,

            update() {
                const maxScroll = _cachedMaxScroll;
                const scrollTop = window.scrollY;

                // 计算进度 (0 到 1)
                this.progress = Math.max(0, Math.min(1, scrollTop / maxScroll));

                // 模式切换逻辑（基于位置阈值，不依赖方向）
                // 滑到底部(>=0.95) → 切换为日出模式
                // 滑到顶部(<=0.05) → 切换为日落模式
                if (this.progress >= 0.95) {
                    this.sunMode = 'sunrise';
                } else if (this.progress <= 0.05) {
                    this.sunMode = 'sunset';
                }

                // 太阳轨迹计算
                const t = this.progress;
                const easedT = t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;

                if (this.sunMode === 'sunrise') {
                    // 日出模式：太阳从左下(地下)向右上(天上)移动
                    // 使用 1-t 反转进度，这样 progress=1(底部)时太阳在地下，progress=0(顶部)时太阳在天上
                    const rt = 1 - t;
                    const reversedEasedT = rt < 0.5 ? 2 * rt * rt : -1 + (4 - 2 * rt) * rt;

                    // X: 从 -0.3 到 0.7 (从左到右) - 与日落对称
                    this.sunPosition.x = -0.3 + reversedEasedT * 1.0;
                    // Y: 从 1.7 到 -0.1 (从地下到天上)
                    const ryProgress = rt < 0.6 ? reversedEasedT : reversedEasedT + (rt - 0.6) * 0.8;
                    this.sunPosition.y = 1.7 - ryProgress * 1.8;
                } else {
                    // 日落模式：太阳从左上到右下
                    // X: 从 0.3 到 1.3
                    this.sunPosition.x = 0.3 + easedT * 1.0;
                    // Y: 从 -0.1 到 1.7
                    const yProgress = t < 0.6 ? easedT : easedT + (t - 0.6) * 0.8;
                    this.sunPosition.y = -0.1 + yProgress * 1.8;
                }

                // 星空显露程度：太阳在 y=0.5 时位于地平线，完全落山后才显露星空
                this.starsReveal = Math.min(1, Math.max(0, (this.sunPosition.y - 0.5) * 1.5));

                // 暮光强度：以地平线(y=0.5)为中心峰值，日出/日落前后可见，深夜归零
                this.twilightIntensity = Math.max(0, 1 - Math.abs(this.sunPosition.y - 0.5) / 0.35);

                // 判断是否白天（太阳在地平线y=0.85以上）
                this.isDay = this.sunPosition.y < 0.85;

                // 更新 CSS 变量（仅在值变化时写入，避免每帧触发全屏重绘）
                const newSunX = this.sunPosition.x.toFixed(4);
                const newSunY = this.sunPosition.y.toFixed(4);
                const newStarsReveal = this.starsReveal.toFixed(4);
                const newTwilight = this.twilightIntensity.toFixed(4);
                [
                    { key: '_lastSunX', css: '--sun-x', val: newSunX },
                    { key: '_lastSunY', css: '--sun-y', val: newSunY },
                    { key: '_lastStarsReveal', css: '--stars-reveal', val: newStarsReveal },
                    { key: '_lastTwilight', css: '--twilight', val: newTwilight }
                ].forEach(({ key, css, val }) => {
                    if (this[key] !== val) {
                        document.body.style.setProperty(css, val);
                        this[key] = val;
                    }
                });

                // 更新 body 类（首次及状态切换时同步）
                if (this.isDay !== this._wasDay || !this._classesInitialized) {
                    if (this.isDay) {
                        document.body.classList.remove('night');
                        document.body.classList.add('day');
                        if (ariaAnnouncer && this._classesInitialized) ariaAnnouncer.textContent = '已切换至白天';
                        if (typeof forceIdleHint === 'function') {
                            forceIdleHint('轻触天空放飞鸟，向下滑动入星河。', 3233);
                        }
                    } else {
                        document.body.classList.add('night');
                        document.body.classList.remove('day');
                        if (ariaAnnouncer && this._classesInitialized) ariaAnnouncer.textContent = '已切换至夜晚';
                        if (typeof forceIdleHint === 'function') {
                            forceIdleHint('单击流星划过，再点，漫天星雨落怀中。', 3233);
                        }

                    this._classesInitialized = true;
                    starsCanvas.classList.toggle('interactive', !this.isDay);
                    if (typeof scheduleIdleHint === 'function') {
                        scheduleIdleHint();
                    }
                }

                // 更新星空画布大小（仅在尺寸变化时重新初始化星星）
                const sizeChanged = resizeStarsCanvas();
                if (sizeChanged || stars.length === 0) {
                    initStars();
                }

                // 更新太阳位置
                updateSunPosition();

                // 晚上触底时刷新叶子数量（仅触发一次）
                if (this.progress >= 0.95 && !this.isDay && lastSurroundingsType === 'trees') {
                    if (!this._hasRefreshedLeavesAtBottom) {
                        refreshTreeLeaves();
                        this._hasRefreshedLeavesAtBottom = true;
                    }
                } else {
                    this._hasRefreshedLeavesAtBottom = false;
                }

                return this.progress;
            }
        };

        // 太阳对象
        let sunMesh = null;

        function hexToRgba(hex, alpha) {
            const r = (hex >> 16) & 255;
            const g = (hex >> 8) & 255;
            const b = hex & 255;
            return `rgba(${r},${g},${b},${alpha})`;
        }

        function createLensflareTexture(kind, colorHex) {
            const canvas = document.createElement('canvas');
            const size = kind === 'streak' ? 256 : 128;
            const h = kind === 'streak' ? 32 : 128;
            canvas.width = size;
            canvas.height = h;
            const ctx = canvas.getContext('2d');
            const cx = size / 2;
            const cy = h / 2;
            ctx.clearRect(0, 0, size, h);

            if (kind === 'glow') {
                // 多层径向渐变，模拟光学散射的复杂 falloff
                const g1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, size / 2);
                g1.addColorStop(0, hexToRgba(colorHex, 0.55));
                g1.addColorStop(0.25, hexToRgba(colorHex, 0.22));
                g1.addColorStop(0.55, hexToRgba(colorHex, 0.08));
                g1.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g1;
                ctx.fillRect(0, 0, size, h);

                // 极中心高亮
                const g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, size * 0.15);
                g2.addColorStop(0, hexToRgba(0xffffff, 0.35));
                g2.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = g2;
                ctx.fillRect(0, 0, size, h);
            } else if (kind === 'hex') {
                // 圆形光斑（bokeh），带边缘亮化和色差
                const r = size * 0.38;
                const rIn = size * 0.28;
                const rEdge = size * 0.42;

                // 1. 外层柔和光晕
                const glowG = ctx.createRadialGradient(cx, cy, r * 0.6, cx, cy, rEdge * 1.2);
                glowG.addColorStop(0, 'rgba(0,0,0,0)');
                glowG.addColorStop(0.6, hexToRgba(colorHex, 0.12));
                glowG.addColorStop(1, 'rgba(0,0,0,0)');
                ctx.fillStyle = glowG;
                ctx.fillRect(0, 0, size, h);

                ctx.globalCompositeOperation = 'lighter';
                // 2. 边缘亮环（圆形）
                ctx.beginPath();
                ctx.arc(cx, cy, rEdge, 0, Math.PI * 2);
                ctx.fillStyle = hexToRgba(colorHex, 0.18);
                ctx.fill();

                // 3. 主体填充 + 轻微色差：R/G/B 三个通道微量偏移叠加
                const caShift = size * 0.015;
                [
                    { dx: -caShift, col: colorHex, a: 0.55 },
                    { dx: 0, col: colorHex, a: 0.55 },
                    { dx: caShift, col: colorHex, a: 0.55 }
                ].forEach((ch, idx) => {
                    ctx.save();
                    ctx.translate(ch.dx, 0);
                    // 用通道色模拟色差：整体变色
                    const channelTint = idx === 0 ? 0xff3333 : (idx === 2 ? 0x3333ff : colorHex);
                    const mix = idx === 1 ? colorHex : Math.round(
                        (Math.round(channelTint / 65536) * 0.25 + Math.round(colorHex / 65536) * 0.75) * 65536 +
                        (Math.round((channelTint % 65536) / 256) * 0.25 + Math.round((colorHex % 65536) / 256) * 0.75) * 256 +
                        (Math.round(channelTint % 256) * 0.25 + Math.round(colorHex % 256) * 0.75)
                    );
                    ctx.beginPath();
                    ctx.arc(cx + ch.dx, cy, r, 0, Math.PI * 2);
                    const gg = ctx.createRadialGradient(cx + ch.dx, cy, rIn * 0.4, cx + ch.dx, cy, r);
                    gg.addColorStop(0, hexToRgba(mix, ch.a * 0.35));
                    gg.addColorStop(0.75, hexToRgba(mix, ch.a * 0.85));
                    gg.addColorStop(1, hexToRgba(mix, ch.a * 0.25));
                    ctx.fillStyle = gg;
                    ctx.fill();
                    ctx.restore();
                });
                ctx.globalCompositeOperation = 'source-over';
            } else if (kind === 'streak') {
                // 变形光条：水平长条，带纵向高斯衰减 + 微弱色差
                const wBar = size * 0.92;
                const hBar = h * 0.55;
                const x0 = cx - wBar / 2;
                const y0 = cy - hBar / 2;

                // 纵向 falloff 渐变
                const gradV = ctx.createLinearGradient(cx, y0, cx, y0 + hBar);
                gradV.addColorStop(0, 'rgba(0,0,0,0)');
                gradV.addColorStop(0.35, hexToRgba(colorHex, 0.55));
                gradV.addColorStop(0.5, hexToRgba(colorHex, 0.85));
                gradV.addColorStop(0.65, hexToRgba(colorHex, 0.55));
                gradV.addColorStop(1, 'rgba(0,0,0,0)');

                // 横向 falloff 渐变
                const gradH = ctx.createLinearGradient(x0, cy, x0 + wBar, cy);
                gradH.addColorStop(0, 'rgba(0,0,0,0)');
                gradH.addColorStop(0.15, hexToRgba(colorHex, 0.45));
                gradH.addColorStop(0.5, hexToRgba(colorHex, 0.90));
                gradH.addColorStop(0.85, hexToRgba(colorHex, 0.45));
                gradH.addColorStop(1, 'rgba(0,0,0,0)');

                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                // 主条
                ctx.fillStyle = gradV;
                ctx.globalAlpha = 0.9;
                ctx.fillRect(x0, y0, wBar, hBar);
                ctx.globalCompositeOperation = 'source-in';
                ctx.fillStyle = gradH;
                ctx.fillRect(x0, y0, wBar, hBar);
                ctx.restore();

                // 外围光晕
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.fillStyle = hexToRgba(colorHex, 0.25);
                ctx.filter = `blur(${h * 0.25}px)`;
                ctx.fillRect(x0, y0 - hBar * 0.3, wBar, hBar * 1.6);
                ctx.restore();
            }
            const tex = new THREE.CanvasTexture(canvas);
            tex.needsUpdate = true;
            return tex;
        }

        const flareElements = [
            { kind: 'glow',   size: 3.8, ratio:  0.00, dist: 0.0, alpha: 0.14, color: 0xffeebb },
            { kind: 'streak', size: 9.0, ratio:  0.00, dist: 0.0, alpha: 0.12, color: 0xfff4dd },
            { kind: 'hex',    size: 0.45, ratio:  1.20, dist: 1.0, alpha: 0.22, color: 0xaaddcc },
            { kind: 'hex',    size: 0.70, ratio: -1.20, dist: 1.0, alpha: 0.24, color: 0x88bbdd },
            { kind: 'hex',    size: 1.05, ratio:  2.30, dist: 1.0, alpha: 0.26, color: 0x77ccaa },
            { kind: 'hex',    size: 1.45, ratio: -2.40, dist: 1.0, alpha: 0.24, color: 0xccaaee },
            { kind: 'hex',    size: 2.10, ratio:  5.50, dist: 1.0, alpha: 0.22, color: 0xeebb66 },

        function createSun() {
            _sunParts = null;
            sunMesh = new THREE.Group();

            const sunVertexShader = 'varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}';

            const coreFs = `
                uniform vec3 uColor,uColorInner;uniform float uTime,uOpacity;varying vec2 vUv;
                float random(vec2 st){return fract(sin(dot(st.xy,vec2(12.9898,78.233)))*43758.5453123);}
                float noise(vec2 st){vec2 i=floor(st),f=fract(st);float a=random(i),b=random(i+vec2(1,0)),c=random(i+vec2(0,1)),d=random(i+vec2(1,1));vec2 u=f*f*(3.0-2.0*f);return mix(a,b,u.x)+(c-a)*u.y*(1.0-u.x)+(d-b)*u.x*u.y;}
                void main(){
                    vec2 cUv=vUv*2.0-1.0;float dist=length(cUv);if(dist>1.0){gl_FragColor=vec4(0.0);return;}
                    float n=noise(vUv*8.0+uTime*0.05)*0.5+noise(vUv*16.0-uTime*0.03)*0.25;
                    float edge=1.0-smoothstep(0.97,1.0,dist);
                    vec3 col=mix(uColorInner,uColor,dist*1.0+n*0.3);
                    gl_FragColor=vec4(col*(0.58+n*0.08),edge*uOpacity);
                }`;

            const glowFs = `
                uniform vec3 uColor;uniform float uIntensity,uDecay;varying vec2 vUv;
                void main(){vec2 cUv=vUv*2.0-1.0;float dist=length(cUv);if(dist>1.0){gl_FragColor=vec4(0.0);return;}
                float alpha=exp(-dist*uDecay)*uIntensity;gl_FragColor=vec4(uColor,alpha);}`;

            function makeGlowMesh(name, size, color, intensity, decay) {
                const mat = new THREE.ShaderMaterial({
                    uniforms: { uColor:{value:new THREE.Color(color)}, uIntensity:{value:intensity}, uDecay:{value:decay} },
                    vertexShader: sunVertexShader,
                    fragmentShader: glowFs,
                    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
                });
                const mesh = new THREE.Mesh(new THREE.PlaneGeometry(size, size), mat);
                mesh.name = name;
                sunMesh.add(mesh);
                return mesh;
            }

            // 1. 太阳核心
            const coreMat = new THREE.ShaderMaterial({
                uniforms: { uTime:{value:0}, uColor:{value:new THREE.Color(0xfff8f0)}, uColorInner:{value:new THREE.Color(0xffffff)}, uOpacity:{value:1.0} },
                vertexShader: sunVertexShader, fragmentShader: coreFs, transparent: true, blending: THREE.AdditiveBlending
            });
            const sunCore = new THREE.Mesh(new THREE.PlaneGeometry(1.0,1.0), coreMat);
            sunCore.name = 'core';
            sunMesh.add(sunCore);

            // 2. 内层光晕
            makeGlowMesh('innerGlow', 1.7, 0xffd4a3, 0.35, 1.8);

            // 3. 外层光晕
            makeGlowMesh('outerGlow', 2.8, 0xffa85c, 0.15, 1.2);

            // 4. 柔和大气光晕层
            [
                { size: 4.5, alpha: 0.10, decay: 1.0 },
                { size: 7.0, alpha: 0.05, decay: 0.7 }
            ].forEach((h, i) => makeGlowMesh(`halo${i}`, h.size, 0xffcc88, h.alpha, h.decay));

            // 5. 镜头光晕光斑 -  cinematic lens flare ghosts
            for (let i = 0; i < flareElements.length; i++) {
                const f = flareElements[i];
                const tex = createLensflareTexture(f.kind, f.color);
                const mat = new THREE.SpriteMaterial({
                    map: tex,
                    color: 0xffffff,
                    transparent: true,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false,
                    opacity: f.alpha
                });
                const flare = new THREE.Sprite(mat);
                flare.name = `flare${i}`;
                const aspect = f.kind === 'streak' ? 0.125 : 1.0;
                // 加入 ±15% 随机扰动，让每次刷新略有不同
                const ratioNoise = f.ratio === 0 ? 0 : f.ratio * ((Math.random() - 0.5) * 0.3);
                const sizeNoise = f.size * ((Math.random() - 0.5) * 0.3);
                const finalRatio = f.ratio + ratioNoise;
                const finalSize = Math.max(0.1, f.size + sizeNoise);
                flare.scale.set(finalSize, finalSize * aspect, 1);
                flare.userData = { ratio: finalRatio, dist: f.dist, baseAlpha: f.alpha, invScaleX: finalSize, invScaleY: finalSize * aspect };
                sunMesh.add(flare);
            }

            sunMesh.position.set(0, 4, 5);
            scene.add(sunMesh);
        }

        // 预分配颜色对象，避免每帧 new THREE.Color 触发 GC
        const _sunColors = {
            noonInner: new THREE.Color(0xfffef8),
            sunsetInner: new THREE.Color(0xffd4a8),
            yolkInner: new THREE.Color(0xffcc33),
            noonOuter: new THREE.Color(0xfff0d4),
            sunsetOuter: new THREE.Color(0xff9444),
            yolkOuter: new THREE.Color(0xffaa00),
            innerGlowNoon: new THREE.Color(0xffe4b8),
            innerGlowSunset: new THREE.Color(0xff7a3c),
            outerGlowNoon: new THREE.Color(0xffcc88),
            outerGlowSunset: new THREE.Color(0xff5533),
            haloNoon: new THREE.Color(0xffeebb),
            haloSunset: new THREE.Color(0xffaa66),
            tmpA: new THREE.Color(),
            tmpB: new THREE.Color()
        };

        // 缓存 sunMesh 子对象引用，避免每帧 getObjectByName 遍历场景图
        let _sunParts = null;
        function getSunParts() {
            if (_sunParts) return _sunParts;
            if (!sunMesh) return null;
            _sunParts = {
                core: sunMesh.getObjectByName('core'),
                innerGlow: sunMesh.getObjectByName('innerGlow'),
                outerGlow: sunMesh.getObjectByName('outerGlow'),
                halos: [],
                flares: []
            };
            for (let i = 0; i < 2; i++) {
                _sunParts.halos.push(sunMesh.getObjectByName(`halo${i}`));
            }
            let fi = 0;
            while (true) {
                const flare = sunMesh.getObjectByName(`flare${fi}`);
                if (!flare) break;
                _sunParts.flares.push(flare);
                fi++;
            }
            return _sunParts;
        }

        // 更新时间动画（用于太阳表面纹理）
        let sunTime = 0;
        function updateSunAnimation(deltaTime) {
            if (!sunMesh) return;
            sunTime += deltaTime;
            const parts = getSunParts();
            if (!parts) return;

            if (parts.core && parts.core.material.uniforms.uTime) {
                parts.core.material.uniforms.uTime.value = sunTime;
            }
        }

        // 缓存太阳状态，避免每帧重复 uniform / matrix 更新
        const _sunCache = {
            x: null, y: null, scale: null, flattenFactor: null,
            brightness: null, glowFade: null, yolkFactor: null,
            sunFade: null, progress: null
        };

        function updateSunPosition() {
            if (!sunMesh) return;
            const parts = getSunParts();
            if (!parts) return;

            // 将归一化坐标转换为 Three.js 坐标
            const x = (TimeState.sunPosition.x - 0.5) * 20;
            const y = (0.5 - TimeState.sunPosition.y) * 12;

            const progress = TimeState.progress;

            // 太阳大小变化（整体缩小）
            let scale;
            if (progress < 0.7) {
                scale = 0.82 + progress * 0.35;
            } else {
                const shrinkProgress = (progress - 0.7) / 0.3;
                scale = 1.065 - shrinkProgress * 0.35;
            }

            // 太阳在画框中的实际 y 坐标（地平线位于 y=0）
            const sunY = sunMesh.position.y;

            // 扁平度：高空保持透视压扁，接近地平线恢复正圆
            const flattenFactor = sunY > 3.0 ? 0.85 : 0.85 + (1 - Math.max(0, sunY) / 3.0) * 0.15;

            // 亮度随高度变化（仍基于进度保证昼夜过渡一致）
            const brightness = progress < 0.7 ? Math.max(0.15, 1 - progress * 0.55) : Math.max(0.15, 0.615 - (progress - 0.7) * 1.5);

            // 光芒和光晕：y>3 时完整，y=-3 时才完全消失，让日落后余晖更持久
            const glowFade = Math.max(0, Math.min(1, (sunY + 3) / 6.0));
            const hasGlow = glowFade > 0.01;

            // 蛋黄颜色深度：越接近地平线越金黄
            const yolkFactor = Math.max(0, Math.min(1, 1 - sunY / 3.5));

            const sunFade = y > -3 ? 1 : Math.max(0, (y + 6) / 3);

            // 脏检查：若关键参数未变，跳过 uniform 与 transform 更新
            if (
                _sunCache.x === x && _sunCache.y === y &&
                _sunCache.scale === scale && _sunCache.flattenFactor === flattenFactor &&
                _sunCache.brightness === brightness && _sunCache.glowFade === glowFade &&
                _sunCache.yolkFactor === yolkFactor && _sunCache.sunFade === sunFade &&
                _sunCache.progress === progress
            ) {
                return;
            }
            _sunCache.x = x; _sunCache.y = y; _sunCache.scale = scale; _sunCache.flattenFactor = flattenFactor;
            _sunCache.brightness = brightness; _sunCache.glowFade = glowFade;
            _sunCache.yolkFactor = yolkFactor; _sunCache.sunFade = sunFade; _sunCache.progress = progress;

            sunMesh.position.x = x;
            sunMesh.position.y = y;

            sunMesh.scale.set(scale, scale * flattenFactor, 1);
            sunMesh.visible = sunFade > 0.01;

            const core = parts.core;

            if (core) {
                core.visible = true;
                const finalInner = _sunColors.tmpA.copy(_sunColors.noonInner).lerp(_sunColors.sunsetInner, progress).lerp(_sunColors.yolkInner, yolkFactor * 0.8).multiplyScalar(brightness);
                const finalOuter = _sunColors.tmpB.copy(_sunColors.noonOuter).lerp(_sunColors.sunsetOuter, progress).lerp(_sunColors.yolkOuter, yolkFactor * 0.7).multiplyScalar(brightness);
                core.material.uniforms.uColorInner.value.copy(finalInner);
                core.material.uniforms.uColor.value.copy(finalOuter);
                core.material.uniforms.uOpacity.value = sunFade;
            }

            // 统一处理内层/外层光晕以及大气光晕层
            const glowParts = [
                { mesh: parts.innerGlow, baseI: 0.35, c0: _sunColors.innerGlowNoon, c1: _sunColors.innerGlowSunset, atten: 0.4 },
                { mesh: parts.outerGlow, baseI: 0.15, c0: _sunColors.outerGlowNoon, c1: _sunColors.outerGlowSunset, atten: 0.6 }
            ];
            glowParts.forEach(({ mesh, baseI, c0, c1, atten }) => {
                if (!mesh) return;
                mesh.visible = hasGlow;
                if (hasGlow) {
                    mesh.material.uniforms.uColor.value.lerpColors(c0, c1, progress);
                    mesh.material.uniforms.uIntensity.value = baseI * (1 - progress * atten) * brightness * glowFade;
                }
            });

            const haloBase = [0.10, 0.05];
            parts.halos.forEach((halo, i) => {
                if (!halo) return;
                halo.visible = hasGlow;
                if (hasGlow) {
                    halo.material.uniforms.uColor.value.lerpColors(_sunColors.haloNoon, _sunColors.haloSunset, progress);
                    halo.material.uniforms.uIntensity.value = haloBase[i] * (1 - progress * 0.3) * brightness * glowFade;
                    halo.scale.set(1 / scale, 1 / scale, 1);
                }
            });

            // 镜头光晕 - 基于太阳坐标镜像偏移，运动更自然、更缓
            const sunDist = Math.hypot(x, y);
            parts.flares.forEach(flare => {
                if (!flare) return;
                flare.visible = hasGlow;
                if (hasGlow) {
                    const fd = flare.userData;
                    const motionScale = 0.22;
                    flare.position.set(-x * fd.ratio * motionScale, -y * fd.ratio * motionScale, 0);
                    let alpha = fd.baseAlpha * (1 - progress * 0.25) * brightness * glowFade;
                    // 软裁剪：远端鬼影在太阳高挂时隐藏，太阳落向画面中央/地平线时才显现
                    if (Math.abs(fd.ratio) >= 4.5) {
                        const edgeFade = Math.max(0, Math.min(1, (sunDist - 1.5) / 4.5));
                        alpha *= (1 - edgeFade);
                    }
                    flare.material.opacity = alpha;
                    flare.scale.set(fd.invScaleX / scale, fd.invScaleY / scale, 1);
                }
            });

            // 核心和光晕大小保持恒定
            [core, parts.innerGlow, parts.outerGlow].forEach(p => { if (p) p.scale.set(1 / scale, 1 / scale, 1); });
        }

        // 调整星空画布尺寸和位置
        function resizeStarsCanvas() {

            if (changed) { starsCanvas.width = w; starsCanvas.height = h; }

        }

        // ============================================

        // ============================================
        const skyCanvas = document.getElementById('sky-canvas');

        // gl_FragCoord 和 CSS 像素坐标系已统一

        // ============================================

        // ============================================
        const birdsCanvas = document.getElementById('birds-canvas');

        const birdsDpr = Math.min(window.devicePixelRatio || 1, 2);

        function resizeBirdsCanvas() {

        resizeBirdsCanvas();

        // 天空着色器
        const skyGeo = new THREE.PlaneGeometry(25, 16);
        const skyMat = new THREE.ShaderMaterial({
            vertexShader: 'varying vec2 vUv;void main(){vUv=uv;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}',
            fragmentShader: `

                float noise(vec2 st){vec2 i=floor(st),f=fract(st);float a=random(i),b=random(i+vec2(1,0)),c=random(i+vec2(0,1)),d=random(i+vec2(1,1));vec2 u=f*f*(3.0-2.0*f);return mix(a,b,u.x)+(c-a)*u.y*(1.0-u.x)+(d-b)*u.x*u.y;}
                float fbm(vec2 p){float v=0.0,a=0.5;for(int i=0;i<5;i++){v+=a*noise(p);p*=2.0;a*=0.5;}return v;}
                float smoothTransition(float t,float e0,float e1){float x=clamp((t-e0)/(e1-e0),0.0,1.0);return x*x*(3.0-2.0*x);}
                void main(){
                    float t=vUv.y,d=uDayNight;
                    vec3 noonTop=vec3(0.25,0.55,0.92),noonMid=vec3(0.45,0.75,0.98),noonBot=vec3(0.75,0.92,1.0);
                    vec3 afternoonTop=vec3(0.32,0.58,0.88),afternoonMid=vec3(0.58,0.78,0.95),afternoonBot=vec3(0.88,0.94,0.98);
                    vec3 sunsetTop=vec3(0.42,0.52,0.78),sunsetMid=vec3(0.92,0.65,0.48),sunsetBot=vec3(1.0,0.82,0.52);
                    vec3 duskTop=vec3(0.28,0.32,0.58),duskMid=vec3(0.95,0.48,0.32),duskBot=vec3(1.0,0.72,0.38);
                    vec3 twilightTop=vec3(0.12,0.15,0.35),twilightMid=vec3(0.42,0.38,0.58),twilightBot=vec3(0.68,0.52,0.55);
                    vec3 nightTop=vec3(0.03,0.04,0.10),nightMid=vec3(0.04,0.06,0.15),nightBot=vec3(0.05,0.06,0.14);
                    float wNoon=1.0-smoothTransition(d,0.0,0.08);
                    float wAfternoon=smoothTransition(d,0.05,0.12)*(1.0-smoothTransition(d,0.18,0.25));
                    float wSunset=smoothTransition(d,0.20,0.28)*(1.0-smoothTransition(d,0.35,0.42));
                    float wDusk=smoothTransition(d,0.35,0.42)*(1.0-smoothTransition(d,0.48,0.55));
                    float wTwilight=smoothTransition(d,0.48,0.55)*(1.0-smoothTransition(d,0.62,0.70));
                    float wNight=smoothTransition(d,0.62,0.70);
                    float totalWeight=wNoon+wAfternoon+wSunset+wDusk+wTwilight+wNight;
                    wNoon/=totalWeight;wAfternoon/=totalWeight;wSunset/=totalWeight;wDusk/=totalWeight;wTwilight/=totalWeight;wNight/=totalWeight;
                    vec3 topColor=noonTop*wNoon+afternoonTop*wAfternoon+sunsetTop*wSunset+duskTop*wDusk+twilightTop*wTwilight+nightTop*wNight;
                    vec3 midColor=noonMid*wNoon+afternoonMid*wAfternoon+sunsetMid*wSunset+duskMid*wDusk+twilightMid*wTwilight+nightMid*wNight;
                    vec3 botColor=noonBot*wNoon+afternoonBot*wAfternoon+sunsetBot*wSunset+duskBot*wDusk+twilightBot*wTwilight+nightBot*wNight;
                    vec3 color;float blend=smoothstep(0.0,1.0,t);

                    else{float lt=(blend-0.5)*2.0;lt=lt*lt*(3.0-2.0*lt);color=mix(midColor,topColor,lt);}
                    float glowIntensity=wSunset*0.6+wDusk*0.8+wTwilight*0.4+wAfternoon*0.2;
                    if(glowIntensity>0.0){
                        float dfh=abs(t-0.5)*2.0,hg=(1.0-smoothstep(0.0,0.6,dfh))*glowIntensity;
                        vec3 glowCol=vec3(1.0,0.75,0.45)*wSunset+vec3(1.0,0.55,0.30)*wDusk+vec3(0.65,0.45,0.55)*wTwilight+vec3(1.0,0.92,0.75)*wAfternoon;
                        color=mix(color,glowCol,hg*0.4);
                    }
                    float atmos=(1.0-t)*(wNoon+wAfternoon)*0.15+(1.0-t)*(wSunset+wDusk)*0.25;

                    vec2 flowUv=vUv*2.0+vec2(uTime*0.002,uTime*0.001);

                    vec3 cloudCol=vec3(0.98,0.99,1.0)*wNoon+vec3(1.0,0.98,0.95)*wAfternoon+vec3(1.0,0.88,0.72)*wSunset+vec3(0.98,0.72,0.58)*wDusk+vec3(0.72,0.68,0.78)*wTwilight+vec3(0.45,0.48,0.58)*wNight;
                    float cloudAlpha=(0.20*wNoon+0.18*wAfternoon+0.25*wSunset+0.22*wDusk+0.12*wTwilight+0.06*wNight)*(1.0-t*0.35);
                    color=mix(color,cloudCol,cloud*cloudAlpha);
                    color=mix(color,color*vec3(0.95,0.98,1.05),wNoon*0.3);
                    color=mix(color,color*vec3(1.08,1.02,0.92),(wSunset+wDusk)*0.2);
                    color=mix(color,color*vec3(0.88,0.92,1.08),wNight*0.4);
                    vec2 sunPos=vec2(uSunX,1.0-uSunY);
                    float distToSun=length(vUv-sunPos),dirFactor=smoothstep(0.0,1.0,distToSun);
                    float twiFactor=wDusk+wTwilight+wNight*0.8;
                    if(twiFactor>0.0){
                        vec3 nightCol=nightBot*(1.0-t)+nightTop*t;
                        float dark=dirFactor*twiFactor,starVis=dark*(1.0-wNoon-wAfternoon);
                        if(starVis>0.05){float starNoise=fract(sin(dot(vUv*50.0,vec2(12.9898,78.233)))*43758.5453123);color+=vec3(step(0.97,starNoise)*starVis*0.35);}
                        color=mix(color,nightCol,dark*0.55);
                    }
                    gl_FragColor=vec4(color,1.0);
                }`,
            transparent: false,
            uniforms: { uTime:{value:0}, uDayNight:{value:0}, uSunX:{value:0.5}, uSunY:{value:0.5} }
        });
        scene.add(new THREE.Mesh(skyGeo, skyMat));

        const SKY_RES_SCALE = 0.6;
        function resizeRenderer() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            renderer.setPixelRatio(1);
            renderer.setSize(w * SKY_RES_SCALE, h * SKY_RES_SCALE, false);

        }

        // ============================================
        // 白天周围环境
        // ============================================
        const surroundCanvas = document.getElementById('surroundings-canvas');
        const surroundCtx = surroundCanvas.getContext('2d');
        // surroundingsGenerated 已在上方提前声明
        const treeCanopyPositions = [];
        const leafParticles = [];
        const mouseWindTrails = [];

        const windLeafCanvas = document.getElementById('wind-leaf-canvas');
        const windLeafCtx = windLeafCanvas.getContext('2d');
        const windLeafDpr = Math.min(window.devicePixelRatio || 1, 2);
        let windLeafCssW = 0, windLeafCssH = 0;
        function resizeWindLeafCanvas() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            windLeafCssW = w;
            windLeafCssH = h;
            windLeafCanvas.width = Math.round(w * windLeafDpr);
            windLeafCanvas.height = Math.round(h * windLeafDpr);
            windLeafCtx.setTransform(windLeafDpr, 0, 0, windLeafDpr, 0, 0);
        }

        const surroundDpr = Math.min(window.devicePixelRatio || 1, 2);
        function resizeSurroundCanvas() {
            const cssW = window.innerWidth;
            const cssH = window.innerHeight;
            const newWidth = Math.round(cssW * surroundDpr);
            const newHeight = Math.round(cssH * surroundDpr);

            // 如果尺寸变化，清空缓存强制重新生成
            if (surroundCanvas.width !== newWidth || surroundCanvas.height !== newHeight) {
                surroundCanvas.width = newWidth;

        // 离屏 Canvas 缓存

        // 绘制带视差偏移的周围环境
        function drawSurroundingsWithParallax() {
            const offsetX = (mousePos.x - 0.5) * 30;
            const offsetY = (mousePos.y - 0.5) * 15;
            const transform = `translate(${-offsetX}px, ${-offsetY}px) scale(1.05)`;
            surroundCanvas.style.transform = transform;
            windLeafCanvas.style.transform = transform;
        }


        // 为每个树冠生成静态叶子
        function initCanopyLeaves() {
            treeCanopyPositions.forEach(canopy => {
                canopy.staticLeaves = [];
                for (let i = 0; i < CONFIG.leaf.perCanopy; i++) {
                    const angle = (Math.PI * 2 / CONFIG.leaf.perCanopy) * i + Math.random() * 0.5;
                    const dist = Math.random() * canopy.size * CONFIG.leaf.canopySizeRatio;
                    canopy.staticLeaves.push({
                        x: canopy.x + Math.cos(angle) * dist,
                        y: canopy.y + Math.sin(angle) * dist * 0.7,
                        size: canopy.size * (CONFIG.leaf.leafSizeRatio.min + Math.random() * (CONFIG.leaf.leafSizeRatio.max - CONFIG.leaf.leafSizeRatio.min)),
                        rotation: Math.random() * CONFIG.leaf.rotationRandom,

                    });
                }
            });
        }

        function generateSurroundings() {
            const w = surroundCanvas.width / surroundDpr;
            const h = surroundCanvas.height / surroundDpr;

            // 检查 canvas 尺寸是否有效
            if (w === 0 || h === 0) return;

            // 检查是否需要重新生成：尺寸变化或首次生成
            if (surroundingsCache && lastSurroundingsSize.w === w && lastSurroundingsSize.h === h) {

            const types = ['trees', 'mountains'];
            let savedType = '';

            let type;

        // ============================================
        // ============================================
        // 动态环境粒子系统
        // ============================================

        // 叶子持续释放系统 - 基于树冠库存
        let leafReleaseTimeout = null;

        // 60秒均匀释放系统：从静态叶子转为动态飘落
        function startUniformLeafRelease(w, h) {
            // 清除之前的定时器
            if (leafReleaseTimeout) {
                clearTimeout(leafReleaseTimeout);
                leafReleaseTimeout = null;
            }

            // 计算总叶子数和释放间隔
            const totalLeaves = treeCanopyPositions.reduce((sum, c) => sum + (c.staticLeaves?.length || 0), 0);
            const baseInterval = (CONFIG.leaf.releaseDuration / totalLeaves); // 基础释放节奏
            const v = CONFIG.leaf.intervalVar;
            const interval = baseInterval * ((1 - v) + Math.random() * (v * 2)); // 随机波动

            const scheduleNextRelease = () => {
                if (!surroundingsGenerated || lastSurroundingsType !== 'trees') return;

                // 找出还有静态叶子的树冠
                const availableCanopies = treeCanopyPositions.filter(c => c.staticLeaves && c.staticLeaves.length > 0);

                if (availableCanopies.length === 0) {
                    // 所有叶子都已释放，停止
                    return;
                }

                // 随机选一个还有静态叶子的树冠
                const canopy = availableCanopies[Math.floor(Math.random() * availableCanopies.length)];
                const staticLeaf = canopy.staticLeaves.pop(); // 取最后一片静态叶子

                // 将静态叶子转为动态飘落
                if (staticLeaf) {
                    convertStaticToDynamicLeaf(staticLeaf, canopy, w, h);
                }

                // 均匀间隔释放
                leafReleaseTimeout = setTimeout(scheduleNextRelease, interval);
            };

            // 启动
            scheduleNextRelease();
        }

        // 绘制风（使用 Path2D + 虚线流动效果）
        function drawWindPath(ctx, styleIndex, cx, cy, angle, scale, dashOffset, life) {
            const path = WIND_PATHS[styleIndex];
            if (!path) return;
            const p = WIND_POSE_PARAMS[styleIndex] || {};

            ctx.save();

            // 移动到中心位置并旋转到风向
            ctx.translate(cx, cy);
            ctx.rotate(angle + (p.rotateOffset || 0) * Math.PI / 180);
            ctx.scale(scale * (p.scaleX || 1), scale * (p.scaleY || 1));
            ctx.translate(p.offsetX || 0, p.offsetY || 0);

            // 设置虚线：固定长度随生命周期缩放，形成流动效果
            // 风的长度现在由 SVG 路径本身决定
            const dashLen = 120 * life;  // 固定虚线长度，随生命周期变化
            const gapLen = 80;           // 固定间距
            ctx.setLineDash([dashLen, gapLen]);
            ctx.lineDashOffset = dashOffset;

            ctx.stroke(path);

            ctx.restore();
        }

        // 将静态叶子转为动态飘落
        function convertStaticToDynamicLeaf(staticLeaf, canopy, w, h) {
            const baseSpeed = CONFIG.leaf.baseSpeed;
            const speedVar = Math.random() * CONFIG.leaf.speedVar;

            let vx, vy;

            // 根据树冠相对于画布中心的位置决定飘落方向（朝根部）
            // 左侧的向左飘，右侧的向右飘，上方的向上飘，下方的向下飘
            const centerX = w * 0.5;
            const centerY = h * 0.5;
            const dx = canopy.x - centerX;
            const dy = canopy.y - centerY;
            const isHorizontal = Math.abs(dx) > Math.abs(dy);

            if (isHorizontal && dx < 0) {
                // 来自左侧，向左飘落
                vx = -(baseSpeed + speedVar) * (0.8 + Math.random() * 0.3);
                vy = (Math.random() - 0.5) * 0.3;
            } else if (isHorizontal && dx > 0) {
                // 来自右侧，向右飘落
                vx = (baseSpeed + speedVar) * (0.8 + Math.random() * 0.3);
                vy = (Math.random() - 0.5) * 0.3;
            } else if (!isHorizontal && dy < 0) {
                // 来自上方，向上飘落
                vy = -(baseSpeed + speedVar) * (0.9 + Math.random() * 0.2);
                vx = (Math.random() - 0.5) * 0.5;
            } else {
                // 来自下方，向下飘落
                vy = (baseSpeed + speedVar) * (0.9 + Math.random() * 0.2);
                vx = (Math.random() - 0.5) * 0.5;
            }

            leafParticles.push({
                x: staticLeaf.x,
                y: staticLeaf.y,
                vx: vx,
                vy: vy,
                rotation: staticLeaf.rotation,
                rotSpeed: (Math.random() - 0.5) * CONFIG.leaf.rotSpeed * 2,
                life: 1,
                decay: 0,
                size: staticLeaf.size,
                color: staticLeaf.color,
                sourceCanopy: canopy,
                isHorizontal: isHorizontal // 记录主方向，风只影响横向
            });
        }

        // 刷新树叶数量：晚上触底时调用
        function refreshTreeLeaves() {
            if (treeCanopyPositions.length === 0) return;
            leafParticles.length = 0; // 清除旧落叶，避免刷新后叠加
            initCanopyLeaves();
            if (surroundingsGenerated && lastSurroundingsType === 'trees') {
                startUniformLeafRelease(surroundCanvas.width / surroundDpr, surroundCanvas.height / surroundDpr);
            }
        }

        function updateAndDrawWind(ctx, dt = 1) {
            if (mouseWindTrails.length === 0) return;

            ctx.save();
            ctx.globalCompositeOperation = 'screen';

            const parallaxX = (mousePos.x - 0.5) * 30;
            const parallaxY = (mousePos.y - 0.5) * 15;
            const scale = 1.05;

            for (let i = mouseWindTrails.length - 1; i >= 0; i--) {
                const trail = mouseWindTrails[i];

                trail.dashOffset -= CONFIG.wind.speed * dt;
                trail.life -= CONFIG.wind.lifeDecay * dt;
                if (trail.life <= 0) {
                    mouseWindTrails.splice(i, 1);
                    continue;
                }

                // 淡入淡出：前 15% 淡入，之后自然淡出
                const fadeIn = Math.min(1, (1 - trail.life) / 0.15);
                const fadeOut = trail.life;
                const alpha = fadeIn * fadeOut * CONFIG.wind.alpha;
                const pose = WIND_POSE_PARAMS[trail.style] || {};
                const poseAlpha = alpha * (pose.opacityMult ?? 1);
                const baseLineWidth = CONFIG.wind.width * fadeOut;

                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';

                const drawX = (trail.cx + parallaxX) * scale;
                const drawY = (trail.cy + parallaxY) * scale;

                // 外层柔光（更宽更淡）
                ctx.strokeStyle = `rgba(255, 255, 255, ${poseAlpha * 0.25})`;
                ctx.lineWidth = baseLineWidth * 3 * (pose.lineWidthMult ?? 1);
                drawWindPath(ctx, trail.style, drawX, drawY, trail.angle, scale, trail.dashOffset, trail.life);

                // 主线条
                ctx.strokeStyle = `rgba(255, 255, 255, ${poseAlpha})`;
                ctx.lineWidth = baseLineWidth * (pose.lineWidthMult ?? 1);
                drawWindPath(ctx, trail.style, drawX, drawY, trail.angle, scale, trail.dashOffset, trail.life);
            }
            ctx.restore();
        }

        function updateAndDrawLeafParticles(ctx, w, h, dt = 1) {
            // 风干扰
            const windX = (mousePos.x - 0.5) * CONFIG.leaf.windInfluence.x;
            const windY = (mousePos.y - 0.5) * CONFIG.leaf.windInfluence.y;

            for (let i = leafParticles.length - 1; i >= 0; i--) {
                const p = leafParticles[i];

                // 检查是否飞出屏幕边界（留出一定余量）
                const margin = 100;
                if (p.x < -margin || p.x > w + margin || p.y < -margin || p.y > h + margin) {
                    leafParticles.splice(i, 1);
                    continue;
                }

                // 风只影响横向漂移，不影响主运动方向
                // 水平运动的叶子（左/右侧），风影响垂直方向（y）
                // 垂直运动的叶子（上/下侧），风影响水平方向（x）
                if (p.isHorizontal) {
                    p.x += p.vx * dt;
                    p.y += (p.vy + windX * 0.5) * dt;
                } else {
                    p.x += (p.vx + windX * 0.8) * dt;
                    p.y += p.vy * dt;
                }
                p.rotation += p.rotSpeed * dt;

                ctx.fillStyle = p.color + CONFIG.leaf.opacity;
                ctx.beginPath();
                ctx.ellipse(p.x, p.y, p.size, p.size * 0.6, p.rotation, 0, Math.PI * 2);
                ctx.fill();
            }

            // 绘制静态叶子（尚未落下的叶子）—— 使用 ellipse 旋转参数避免 save/restore
            treeCanopyPositions.forEach(canopy => {
                if (canopy.staticLeaves && canopy.staticLeaves.length > 0) {
                    ctx.fillStyle = canopy.staticLeaves[0].color + CONFIG.leaf.staticOpacity;
                    canopy.staticLeaves.forEach(leaf => {
                        ctx.beginPath();
                        ctx.ellipse(leaf.x, leaf.y, leaf.size, leaf.size * 0.6, leaf.rotation, 0, Math.PI * 2);
                        ctx.fill();
                    });
                }
            });
        }

        // ============================================
        // 艺术风景观绘制 - Canvas 2D API
        // ============================================
        function drawTreeCanopies(w, h, ctx) {
            // 使用配置中的调色板
            const leafPalette = CONFIG.tree.palette;

            function drawArtisticBranch(x1, y1, x2, y2, width, depth) {
                if (depth <= 0) {
                    // 只记录树冠位置，不绘制静态叶丛
                    // 叶子完全由动态粒子系统生成和落下
                    const colors = leafPalette[Math.floor(Math.random() * leafPalette.length)];
                    const size = width * 3 + Math.random() * 8;
                    treeCanopyPositions.push({ x: x2, y: y2, size, colors });
                    return;
                }

                // 绘制枝干
                ctx.strokeStyle = '#4a4035';
                ctx.lineWidth = width;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();

                // 分叉参数从配置读取
                const angle = Math.atan2(y2 - y1, x2 - x1);
                const length = Math.hypot(x2 - x1, y2 - y1) * CONFIG.tree.lengthDecay;
                const bc = CONFIG.tree.branchProb1;
                const bc2 = CONFIG.tree.branchProb2;
                const branchChance1 = bc.min + Math.random() * (bc.max - bc.min);
                const branchChance2 = bc2.min + Math.random() * (bc2.max - bc2.min);
                const asp1 = CONFIG.tree.angleSpread1;
                const asp2 = CONFIG.tree.angleSpread2;
                const angleSpread1 = asp1.min + Math.random() * (asp1.max - asp1.min);
                const angleSpread2 = asp2.min + Math.random() * (asp2.max - asp2.min);

                if (Math.random() > branchChance1) {
                    const newAngle1 = angle + (Math.random() - 0.5) * angleSpread1;
                    const newX1 = x2 + Math.cos(newAngle1) * length;
                    const newY1 = y2 + Math.sin(newAngle1) * length;
                    drawArtisticBranch(x2, y2, newX1, newY1, width * CONFIG.tree.widthDecay.primary, depth - 1);
                }
                if (Math.random() > branchChance2) {
                    const newAngle2 = angle + (Math.random() - 0.5) * angleSpread2;
                    const newX2 = x2 + Math.cos(newAngle2) * length * 0.8;
                    const newY2 = y2 + Math.sin(newAngle2) * length * 0.8;
                    drawArtisticBranch(x2, y2, newX2, newY2, width * CONFIG.tree.widthDecay.secondary, depth - 1);
                }
            }

            // 从四周绘制树木（往内缩，留出天空）- 使用配置中的位置
            const tp = CONFIG.tree.positions;
            const positions = [
                // 底部
                ...tp.bottom.map(x => ({ x: w * x, y: h, angle: -Math.PI / 2 + (Math.random() - 0.5) * 0.3 })),
                // 顶部垂下
                ...tp.top.map(x => ({ x: w * x, y: 0, angle: Math.PI / 2 + (Math.random() - 0.5) * 0.3 })),
                // 两侧
                ...tp.left.map(y => ({ x: 0, y: h * y, angle: 0.2 + Math.random() * 0.1 })),
                ...tp.right.map(y => ({ x: w, y: h * y, angle: Math.PI - 0.2 - Math.random() * 0.1 }))
            ];

            positions.forEach(pos => {
                const length = h * (0.075 + Math.random() * 0.055);
                const endX = pos.x + Math.cos(pos.angle) * length;
                const endY = pos.y + Math.sin(pos.angle) * length;
                const d = CONFIG.tree.depth;
                const depth = d.min + Math.floor(Math.random() * (d.max - d.min + 1));
                drawArtisticBranch(pos.x, pos.y, endX, endY, 4 + Math.random() * 2, depth);
            });

        }

        function drawMountains(w, h, ctx) {
            const drawH = h * 0.55;

            // 水彩山脉绘制
            function drawArtisticMountainLayer(yBase, heightMul, color, opacity, blur) {
                ctx.save();
                if (blur > 0) {
                    ctx.filter = `blur(${blur}px)`;
                }

                const points = [];
                const segments = CONFIG.mountain.segments;

                for (let i = 0; i <= segments; i++) {
                    const x = (i / segments) * w;
                    // 使用多层噪声模拟自然山脉
                    let noise = 0;
                    let amp = 1;
                    let freq = 1;
                    for (let o = 0; o < CONFIG.mountain.noiseOctaves; o++) {
                        noise += Math.sin(i * freq * 0.5 + o * 10) * amp;
                        amp *= 0.5;
                        freq *= 2;
                    }
                    noise = noise * 0.5 + 0.5;

                    const y = yBase - drawH * heightMul * (0.4 + noise * 0.6);
                    points.push({ x, y });
                }

                // 绘制山体
                ctx.fillStyle = color + Math.floor(opacity * 255).toString(16).padStart(2, '0');
                ctx.beginPath();
                ctx.moveTo(0, h);
                ctx.lineTo(points[0].x, points[0].y);

                for (let i = 0; i < points.length - 1; i++) {
                    const curr = points[i];
                    const next = points[i + 1];
                    const midX = (curr.x + next.x) / 2;
                    const midY = (curr.y + next.y) / 2;
                    ctx.quadraticCurveTo(curr.x, curr.y, midX, midY);
                }

                ctx.lineTo(points[points.length - 1].x, points[points.length - 1].y);
                ctx.lineTo(w, h);
                ctx.closePath();
                ctx.fill();

                ctx.restore();
            }

            // 使用配置的山脉层
            const mc = CONFIG.mountain;
            mc.layers.forEach(layer => {
                drawArtisticMountainLayer(h, layer.height, layer.color, layer.opacity, layer.blur);
            });

            // 添加山脉线条细节
            ctx.strokeStyle = 'rgba(255,255,255,0.15)';
            ctx.lineWidth = 1;
            for (let i = 0; i < mc.detailLines; i++) {
                const x = Math.random() * w;
                const y = h - Math.random() * drawH * 0.4;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.lineTo(x - 15, y - 20);
                ctx.stroke();
            }

            // 添加山脚下的草丛
            for (let i = 0; i < mc.grassCount; i++) {
                const x = Math.random() * w;
                const y = h - Math.random() * 30;
                const height = 10 + Math.random() * 15;
                const lean = (Math.random() - 0.5) * 10;

                ctx.strokeStyle = `rgba(100, 130, 90, ${0.3 + Math.random() * 0.3})`;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x, y);
                ctx.quadraticCurveTo(x + lean, y - height * 0.5, x + lean * 1.5, y - height);
                ctx.stroke();
            }
        }

            // 生成虚构星座星星数据
            function createConstellationStar(name, cx, cy, mag, colorKey) {
                return {
                    name,
                    x: cx,
                    y: cy,
                    mag,
                    color: colorKey,
                    size: magToSize(mag)
                };
            }

            // 星等转大小：现在所有星星保持相近尺寸，差异主要在亮度
            function magToSize(mag) {
                const sr = CONFIG.stars.sizeRanges;
                const tiers = [
                    { limit: 0.5, min: sr.large.min, max: sr.large.max },
                    { limit: 1.0, min: sr.medium.min, max: sr.medium.max },
                    { limit: 1.5, min: sr.small.min, max: sr.small.max },
                    { limit: 2.0, min: sr.tiny.min, max: sr.tiny.max },
                    { limit: 2.5, min: sr.tiny.min, max: sr.tiny.max }
                ];
                for (const t of tiers) {
                    if (mag < t.limit) return t.min + Math.random() * (t.max - t.min);
                }
                return sr.tiny.min + Math.random() * (sr.tiny.max - sr.tiny.min);

            // 固定成对彩蛋
            const buddyPairs = [
                ['liandao', 'chuitou'],
            ];

            // 构建选择单元
            const buddyUnits = [];
            const usedNames = new Set();
            buddyPairs.forEach(pairNames => {
                const pairDefs = pairNames.map(name => constellationDefs.find(d => d.name === name)).filter(Boolean);
                if (pairDefs.length === 2) {
                    buddyUnits.push(pairDefs);
                    pairNames.forEach(n => usedNames.add(n));
                }
            });

            // 小狗座彩蛋：要么跟小鸟座，要么跟骨头座一起出现
            const xiaowangDef = constellationDefs.find(d => d.name === 'xiaowang');
            const xiaoniaoDef = constellationDefs.find(d => d.name === 'xiaoniao');
            const gutouDef = constellationDefs.find(d => d.name === 'gutou');
            let xiaowangUnit = null;
            if (xiaowangDef) {
                const partner = Math.random() < 0.5 ? xiaoniaoDef : gutouDef;
                if (partner) {
                    xiaowangUnit = [xiaowangDef, partner];
                    usedNames.add('xiaowang');
                    usedNames.add(partner.name);
                }
            }

            const singles = constellationDefs.filter(d => !usedNames.has(d.name));

            // 随机打乱
            buddyUnits.sort(() => Math.random() - 0.5);
            singles.sort(() => Math.random() - 0.5);

            const selectedDefs = [];
            let selectedCount = 0;

            // 先随机抽固定 buddy 对
            for (const unit of buddyUnits) {
                if (selectedCount + unit.length <= targetCount) {
                    selectedDefs.push(...unit);
                    selectedCount += unit.length;
                }
            }

            // 再决定是否加入小狗座彩蛋单元（2个）
            if (xiaowangUnit && selectedCount + xiaowangUnit.length <= targetCount) {
                selectedDefs.push(...xiaowangUnit);
                selectedCount += xiaowangUnit.length;
                // 从 singles 中移除已入队的搭档，防止重复
                const partnerName = xiaowangUnit[1].name;
                for (let i = singles.length - 1; i >= 0; i--) {
                    if (singles[i].name === partnerName) {
                        singles.splice(i, 1);
                        break;
                    }
                }
            }

            // 最后用单星座补齐
            while (selectedCount < targetCount && singles.length > 0) {
                selectedDefs.push(singles.pop());
                selectedCount++;
            }

            // 收集所有星座星星和连线
            const allConstellationStars = [];
            const allLines = [];
            const nameToDisplay = {};
            const prefixToDisplay = {};

            // 计算均匀网格，让星座铺满夜空而不堆在中央或边缘
            const gridCols = Math.max(1, Math.ceil(Math.sqrt(selectedDefs.length * w / h)));
            const gridRows = Math.max(1, Math.ceil(selectedDefs.length / gridCols));
            const cellW = w / gridCols;
            const cellH = h / gridRows;

            const cells = [];
            for (let r = 0; r < gridRows; r++) {
                for (let c = 0; c < gridCols; c++) {
                    cells.push({ r, c });
                }
            }
            cells.sort(() => Math.random() - 0.5);

            const marginX = cellW * 0.22;
            const marginY = cellH * 0.22;

            const usedCells = new Set();
            function getCell() {
                while (cells.length) {
                    const c = cells.pop();
                    const key = `${c.r},${c.c}`;
                    if (!usedCells.has(key)) {
                        usedCells.add(key);
                        return c;
                    }
                }
                return null;
            }
            function getAdjacent(cell) {
                const dirs = [[0, 1], [0, -1], [1, 0], [-1, 0]];
                dirs.sort(() => Math.random() - 0.5);
                for (const [dr, dc] of dirs) {
                    const nr = cell.r + dr, nc = cell.c + dc;
                    if (nr >= 0 && nr < gridRows && nc >= 0 && nc < gridCols) {
                        const key = `${nr},${nc}`;
                        if (!usedCells.has(key)) {
                            usedCells.add(key);
                            return { r: nr, c: nc };
                        }
                    }
                }
                return getCell();
            }

            function placeDef(def, cell, buddyAnchor = null) {
                const scale = (constellationScales[def.name] || 1.0) * constellationGlobalScale;
                const center = {
                    x: def.stars.reduce((sum, s) => sum + s.x, 0) / def.stars.length,
                    y: def.stars.reduce((sum, s) => sum + s.y, 0) / def.stars.length
                };

                let newCenter;
                if (buddyAnchor) {
                    // 紧挨 buddy：只在自身格子方向上偏移很小一段距离
                    const cellCX = cell.c * cellW + cellW * 0.5;
                    const cellCY = cell.r * cellH + cellH * 0.5;
                    const dx = cellCX - buddyAnchor.x;
                    const dy = cellCY - buddyAnchor.y;
                    newCenter = {
                        x: buddyAnchor.x + dx * 0.52 + (Math.random() - 0.5) * cellW * 0.12,
                        y: buddyAnchor.y + dy * 0.52 + (Math.random() - 0.5) * cellH * 0.12
                    };
                } else {
                    newCenter = {
                        x: cell.c * cellW + marginX + Math.random() * Math.max(1, cellW - marginX * 2),
                        y: cell.r * cellH + marginY + Math.random() * Math.max(1, cellH - marginY * 2)
                    };
                }

                const prefix = def.stars[0].name.substring(0, 3);
                prefixToDisplay[prefix] = def.displayName;
                def.stars.forEach(s => {
                    allConstellationStars.push({
                        ...s,
                        x: newCenter.x + (s.x - center.x) * scale,
                        y: newCenter.y + (s.y - center.y) * scale,
                        size: s.size * scale
                    });
                    nameToDisplay[s.name] = def.displayName;
                });
                def.lines.forEach(line => allLines.push(line));
                return newCenter;
            }

            // 成对星座分组，确保 buddy 星座在网格中相邻
            const placedNames = new Set();
            const placementGroups = [];

            // 固定 buddy 对：镰刀 + 锤头
            const fixedBuddies = [['liandao', 'chuitou']];
            fixedBuddies.forEach(([n1, n2]) => {
                const d1 = selectedDefs.find(d => d.name === n1);
                const d2 = selectedDefs.find(d => d.name === n2);
                if (d1 && d2) {
                    placementGroups.push({ type: 'pair', defs: [d1, d2] });
                    placedNames.add(n1); placedNames.add(n2);
                }
            });

            // 小狗座彩蛋：小鸟或骨头
            const xw = selectedDefs.find(d => d.name === 'xiaowang');
            const xwPartnerName = xiaowangUnit ? xiaowangUnit[1].name : null;
            const xwPartner = xwPartnerName ? selectedDefs.find(d => d.name === xwPartnerName) : null;
            if (xw && xwPartner) {
                placementGroups.push({ type: 'pair', defs: [xw, xwPartner] });
                placedNames.add('xiaowang');
                placedNames.add(xwPartnerName);
            }

            // 单星座
            selectedDefs.forEach(d => {
                if (!placedNames.has(d.name)) {
                    placementGroups.push({ type: 'single', defs: [d] });
                }
            });

            placementGroups.sort(() => Math.random() - 0.5);
            placementGroups.forEach(g => {
                if (g.type === 'pair') {
                    const c1 = getCell();
                    const c2 = c1 ? getAdjacent(c1) : getCell();
                    const anchor = placeDef(g.defs[0], c1 || getCell());
                    placeDef(g.defs[1], c2 || getCell(), anchor);
                } else {
                    placeDef(g.defs[0], getCell());
                }
            });

            // 添加星座星星到星星数组
            const constellationStarMap = {};
            allConstellationStars.forEach(starData => {
                const color = CONFIG.stars.colors[starData.color] || CONFIG.stars.colors['white'];
                const star = {
                    x: starData.x,
                    y: starData.y,
                    size: starData.size,
                    color,
                    twinkleSpeed: 0.005 + Math.random() * 0.008,
                    twinklePhase: Math.random() * Math.PI * 2,
                    brightness: 0.5 + (starData.mag < 1 ? 0.45 : 0.2) + Math.random() * 0.1,
                    hasSpikes: true,
                    constellationName: nameToDisplay[starData.name]
                };
                stars.push(star);
                constellationStarMap[starData.name] = star;
            });

            // 保存星座连线信息供绘制使用
            stars.constellations = allLines;
            stars.constellationStars = allConstellationStars;
            stars.constellationNames = nameToDisplay;
            stars.constellationPrefixes = prefixToDisplay;
            stars.constellationStarMap = constellationStarMap;

            // 添加背景小星 - 使用配置 (starColors 已在上方声明)

            // 生成背景星星，均匀随机分布在整个夜空
            for (let i = 0; i < CONFIG.stars.backgroundCount; i++) {
                const x = Math.random() * w;
                const y = Math.random() * h * 0.98;

                // 大小分布 - 使用配置阈值
                const sizeRoll = Math.random();
                const sr = CONFIG.stars.sizeRanges;
                const sd = CONFIG.stars.sizeDistribution;
                const sizeTiers = [
                    { limit: sd.large, range: sr.large },
                    { limit: sd.medium, range: sr.medium },
                    { limit: sd.small, range: sr.small }
                ];
                let size = sr.tiny.min + Math.random() * (sr.tiny.max - sr.tiny.min);
                for (const t of sizeTiers) {
                    if (sizeRoll > t.limit) {
                        size = t.range.min + Math.random() * (t.range.max - t.range.min);
                        break;
                    }
                }

                const color = starColors[Math.floor(Math.random() * starColors.length)];

                // 基础亮度使用配置，并附加 ±5% 波动
                const b = CONFIG.stars.brightness;
                const brightnessBase = b.min + Math.random() * (b.max - b.min);
                const varRange = CONFIG.stars.brightnessVar || 0.05;
                const brightness = Math.max(0, Math.min(1, brightnessBase * (1 + (Math.random() - 0.5) * varRange * 2)));
                const ts = CONFIG.stars.twinkleSpeed;

                stars.push({
                    x, y, size, color,
                    twinkleSpeed: ts.min + Math.random() * (ts.max - ts.min),
                    twinklePhase: Math.random() * Math.PI * 2,
                    brightness,
                    hasSpikes: true,
                });
            }

            // 按大小排序，小星先绘制
            stars.sort((a, b) => a.size - b.size);

            // 预计算并缓存星座分组，避免 drawMouseConstellation 每帧重建对象
            const cachedGroups = {};
            const starDataMap = {};
            allConstellationStars.forEach(s => { starDataMap[s.name] = s; });
            const starNameToRenderStar = constellationStarMap;
            if (allLines) {
                allLines.forEach(line => {
                    if (!line || line.length === 0) return;
                    const prefix = line[0].substring(0, 3);
                    if (!cachedGroups[prefix]) {
                        cachedGroups[prefix] = {
                            name: (prefixToDisplay && prefixToDisplay[prefix]) || prefix,
                            lines: [],
                            stars: new Set()
                        };
                    }
                    cachedGroups[prefix].lines.push(line);
                    line.forEach(name => cachedGroups[prefix].stars.add(name));
                });
                Object.values(cachedGroups).forEach(group => {
                    let centerX = 0;
                    let minY = Infinity;
                    let labelStar = null;
                    group.stars.forEach(starName => {
                        const starData = starDataMap[starName];
                        if (!starData) return;
                        centerX += starData.x;
                        if (starData.y < minY) {
                            minY = starData.y;
                            labelStar = starData;
                        }
                    });
                    group.centerX = centerX / group.stars.size;
                    group.labelStar = labelStar;
                });
            }
            stars.constellationStarDataMap = starDataMap;
            stars.cachedConstellationGroups = cachedGroups;
        }

        // 普通流星 - 支持点击定向
        class Meteor {
            constructor(targetX = null, targetY = null) {
                this.reset(targetX, targetY);
            }
            reset(targetX = null, targetY = null) {
                const w = starsCanvas?.width || 800;
                const h = starsCanvas?.height || 500;
                const mc = CONFIG.meteor;

                // 流星在夜空某部分昙花一现，不贯穿整个天空
                // 起点在画布内部随机位置（留边距避免贴边）
                const margin = mc.margin;
                this.x = margin + Math.random() * (w - margin * 2);
                this.y = margin + Math.random() * (h - margin * 2);

                // 随机飞行方向
                this.angle = Math.random() * Math.PI * 2;

                // 短距离飞行：流星划过一小片天空后消失
                this.speed = mc.speed.min + Math.random() * (mc.speed.max - mc.speed.min);
                this.maxDistance = mc.maxDistance.min + Math.random() * (mc.maxDistance.max - mc.maxDistance.min);
                this.traveled = 0;

                // 如果有目标点（点击位置），微调角度朝向目标
                if (targetX !== null && targetY !== null) {
                    const targetAngle = Math.atan2(targetY - this.y, targetX - this.x);
                    // 角度偏移 ±30度，不完全精确指向
                    this.angle = targetAngle + (Math.random() - 0.5) * 1.0;
                }

                this.length = mc.length.min + Math.random() * (mc.length.max - mc.length.min);
                this.life = 1;
                this.active = true;
                this.width = mc.width.min + Math.random() * (mc.width.max - mc.width.min);
                this.radiantX = null;
                this.radiantY = null;
            }
            resetRadiant(radiantX, radiantY) {
                this.radiantX = radiantX;
                this.radiantY = radiantY;
                const ms = CONFIG.meteor.shower;

                // 50% 概率向外飞（从辐射点发散），50% 概率向内飞（向辐射点汇聚）
                this.outward = Math.random() < 0.5;

                // 随机选择辐射方向（360度）
                const baseAngle = Math.random() * Math.PI * 2;

                const baseSpeed = CONFIG.meteor.speed.min + Math.random() * (CONFIG.meteor.speed.max - CONFIG.meteor.speed.min);
                this.speed = baseSpeed * (ms.speedScale || 0.6);
