                this.maxDistance = ms.maxDistance.min + Math.random() * (ms.maxDistance.max - ms.maxDistance.min);
                this.traveled = 0;

                if (this.outward) {
                    // 向外飞：起点在辐射点附近，朝外侧飞行
                    const offset = 3 + Math.random() * 15;
                    this.startDistance = offset;
                    this.x = radiantX + Math.cos(baseAngle) * offset;
                    this.y = radiantY + Math.sin(baseAngle) * offset;
                    this.angle = baseAngle;

                    // 长度随飞行逐渐增长（近短远长）
                    this.baseLength = CONFIG.meteor.length.min * 0.3;
                    this.fullLength = CONFIG.meteor.length.min + Math.random() * (CONFIG.meteor.length.max - CONFIG.meteor.length.min);
                } else {
                    // 向内飞：起点在远处，朝辐射点飞行
                    const startOffset = this.maxDistance * (0.7 + Math.random() * 0.3);
                    this.startDistance = startOffset;
                    this.x = radiantX + Math.cos(baseAngle) * startOffset;
                    this.y = radiantY + Math.sin(baseAngle) * startOffset;
                    this.angle = baseAngle + Math.PI; // 反向，指向辐射点

                    // 向内飞：长度随靠近辐射点缩短（远长近短）
                    this.baseLength = CONFIG.meteor.length.min * 0.3;
                    this.fullLength = CONFIG.meteor.length.min + Math.random() * (CONFIG.meteor.length.max - CONFIG.meteor.length.min);
                }
                this.length = this.outward ? this.baseLength : this.fullLength;
                this.life = 1;
                this.active = true;
                this.width = CONFIG.meteor.width.min + Math.random() * (CONFIG.meteor.width.max - CONFIG.meteor.width.min);
            }
            update() {
                if (!this.active) return;

                const dx = Math.cos(this.angle) * this.speed;
                const dy = Math.sin(this.angle) * this.speed;
                this.x += dx;
                this.y += dy;
                this.traveled += this.speed;

                // 辐射点流星长度动态变化
                if (this.radiantX !== null && this.baseLength !== undefined) {
                    if (this.outward) {
                        const growT = Math.min(1, this.traveled / (this.maxDistance * 0.5));
                        this.length = this.baseLength + (this.fullLength - this.baseLength) * growT;
                    } else {
                        // 向内飞：越靠近辐射点越短（远长近短）
                        const remain = Math.max(0, this.startDistance - this.traveled);
                        const shrinkT = 1 - Math.min(1, remain / this.startDistance);
                        this.length = this.fullLength - (this.fullLength - this.baseLength) * shrinkT;
                    }
                }

                // 短距离飞行后消失（昙花一现效果）
                if (this.traveled >= this.maxDistance) {
                    this.life -= CONFIG.meteor.fadeSpeed;
                }

                if (this.life <= 0) {
                    this.active = false;
                }
            }
            draw(ctx) {
                if (!this.active) return;

                ctx.save();
                ctx.globalAlpha = Math.max(0, this.life);
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);

                const len = this.length;
                const maxW = this.width * 1.6;

                // 绘制两头尖、中间紧收的纺锤形
                const drawSpindle = (halfWidth, gradient) => {
                    ctx.beginPath();
                    // 头部尖端
                    ctx.moveTo(0, 0);
                    // 下侧到尾部尖端（控制点乘数 1.4，让中段更修长）
                    ctx.quadraticCurveTo(-len * 0.5, halfWidth * 1.4, -len, 0);
                    // 上侧回到头部尖端
                    ctx.quadraticCurveTo(-len * 0.5, -halfWidth * 1.4, 0, 0);
                    ctx.closePath();
                    ctx.fillStyle = gradient;
                    ctx.fill();
                };

                // 外层 glow（宽而淡）
                const gradOuter = ctx.createLinearGradient(-len, 0, 0, 0);
                gradOuter.addColorStop(0.0, 'rgba(200, 225, 255, 0)');
                gradOuter.addColorStop(0.5, 'rgba(200, 225, 255, 0.14)');
                gradOuter.addColorStop(1.0, 'rgba(200, 225, 255, 0)');
                drawSpindle(maxW * 1.2, gradOuter);

                // 中层光带
                const gradMid = ctx.createLinearGradient(-len, 0, 0, 0);
                gradMid.addColorStop(0.0, 'rgba(220, 235, 255, 0)');
                gradMid.addColorStop(0.5, 'rgba(220, 235, 255, 0.38)');
                gradMid.addColorStop(1.0, 'rgba(220, 235, 255, 0)');
                drawSpindle(maxW * 0.52, gradMid);

                // 内芯（最亮最实）
                const gradCore = ctx.createLinearGradient(-len, 0, 0, 0);
                gradCore.addColorStop(0.0, 'rgba(235, 242, 255, 0)');
                gradCore.addColorStop(0.4, 'rgba(235, 242, 255, 0.85)');
                gradCore.addColorStop(0.6, 'rgba(245, 248, 255, 0.95)');
                gradCore.addColorStop(1.0, 'rgba(235, 242, 255, 0)');
                drawSpindle(maxW * 0.20, gradCore);

                // 头部极亮核
                ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
                ctx.beginPath();
                ctx.arc(0, 0, this.width * 0.16, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // 彗星 - 基于 comet.html 的动态丝线渲染
        class Comet {
            constructor() {
                this.active = false;
                this.progress = 0;
                this.time = 0;
                this.dustStrands = [];
                this.params = null;
            }

            reset() {
                const w = starsCanvas?.width || 800;
                const h = starsCanvas?.height || 500;

                // 生成随机参数（直接内联，避免额外函数）
                const cp = CONFIG.comet.params;
                this.params = {
                    spread: cp.spread.min + Math.random() * (cp.spread.max - cp.spread.min),
                    windSpeed: cp.windSpeed.min + Math.random() * (cp.windSpeed.max - cp.windSpeed.min),
                    waveSize: cp.waveSize.min + Math.random() * (cp.waveSize.max - cp.waveSize.min),
                    ionAlpha: cp.ionAlpha.min + Math.random() * (cp.ionAlpha.max - cp.ionAlpha.min),
                    dustAlpha: cp.dustAlpha.min + Math.random() * (cp.dustAlpha.max - cp.dustAlpha.min),
                    numStrands: cp.numStrands.min + Math.floor(Math.random() * (cp.numStrands.max - cp.numStrands.min))
                };

                const margin = 50;
                const paths = [
                    { sx: -margin, sy: h + margin, ex: w + margin, ey: -margin, arc: false },
                    { sx: w + margin, sy: h + margin, ex: -margin, ey: -margin, arc: false },
                    { sx: -margin, sy: -margin, ex: w + margin, ey: h + margin, arc: false },
                    { sx: w + margin, sy: -margin, ex: -margin, ey: h + margin, arc: false },
                    { sx: w * 0.1, sy: h + margin, ex: w * 0.9, ey: h + margin, arc: true },
                    { sx: w * 0.9, sy: h + margin, ex: w * 0.1, ey: h + margin, arc: true }
                ];
                const p = paths[Math.floor(Math.random() * paths.length)];
                this.startX = p.sx; this.startY = p.sy;
                this.endX = p.ex; this.endY = p.ey;
                this.isArc = p.arc;

                // 计算控制点
                const midX = (this.startX + this.endX) * 0.5;
                const midY = (this.startY + this.endY) * 0.5;
                if (this.isArc) {
                    // 抛物线：控制点向上偏移，形成拱形
                    this.peakX = midX;
                    this.peakY = -h * 0.3; // 拱到屏幕上方30%处
                } else {
                    // 直线：控制点就是中点
                    this.peakX = midX;
                    this.peakY = midY;
                }

                this.flightAngle = Math.atan2(this.endY - this.startY, this.endX - this.startX);

                // 进度和速度
                this.progress = 0;
                const cs = CONFIG.comet.speed;
                this.speed = cs.min + Math.random() * (cs.max - cs.min);
                this.time = 0;

                // 预生成尘埃丝线
                this.dustStrands = [];
                const st = CONFIG.comet.strand;
                for (let i = 0; i < this.params.numStrands; i++) {
                    this.dustStrands.push({
                        angleOffset: Math.random() * (st.angleOffset.max - st.angleOffset.min) + st.angleOffset.min,
                        length: Math.random() * (st.length.max - st.length.min) + st.length.min,
                        lineWidth: Math.random() * (st.lineWidth.max - st.lineWidth.min) + st.lineWidth.min,
                        alpha: Math.random() * this.params.dustAlpha + 0.01,
                        phase: Math.random() * Math.PI * 2
                    });
                }

                // 彗尾方向配置（固定朝上，但保留随机细节）
                const ta = CONFIG.comet.tailAngle;
                const baseAngle = ta.baseAngle;
                const randomOffset = (Math.random() - 0.5) * 0.3;
                this.tailAngle = baseAngle + randomOffset + ta.globalOffset;

                // 尘埃尾弯曲方向：50%向左凸，50%向右凸
                this.dustTailCurveDir = Math.random() < 0.5 ? -1 : 1;

                this.active = true;
                this.updatePosition();
            }

            updatePosition() {
                const t = this.progress;
                if (t <= 1) {
                    const mt = 1 - t;
                    // 二次贝塞尔曲线
                    this.x = mt * mt * this.startX + 2 * mt * t * this.peakX + t * t * this.endX;
                    this.y = mt * mt * this.startY + 2 * mt * t * this.peakY + t * t * this.endY;
                } else {
                    // 曲线结束后沿切线方向继续直线飞行，确保彗尾完全离开屏幕
                    const over = t - 1;
                    this.x = this.endX + (this.endX - this.peakX) * over * 2;
                    this.y = this.endY + (this.endY - this.peakY) * over * 2;
                }
            }

            update() {
                if (!this.active) return;
                this.progress += this.speed;
                this.time += 0.01 * this.params.windSpeed;
                this.updatePosition();
                // 飞完全程直到完全离开屏幕
                if (this.progress >= 1.8) {
                    this.active = false;
                    if (this._pool) this._pool.release(this);
                }
            }

            draw(ctx) {
                if (!this.active || !this.params) return;

                const cx = this.x;
                const cy = this.y;

                // 基于进度做淡入淡出
                const pf = CONFIG.comet.progressFade;
                const fadeIn = Math.min(1, this.progress / pf.in);
                const fadeOut = Math.min(1, (1.8 - this.progress) / pf.out);
                this.visibility = Math.max(0, fadeIn * fadeOut);

                // 随天空亮度消退（日出时快速隐去）
                const dayMask = Math.min(1, TimeState.starsReveal * 4);
                if (dayMask <= 0) return;
                const v = this.visibility * dayMask * 0.42;

                ctx.save();
                ctx.translate(cx, cy);
                ctx.rotate(this.tailAngle);
                ctx.scale(1.5, 1.5); // 整体放大1.5倍
                ctx.globalCompositeOperation = 'screen';

                // 由远及近绘制：彗发 -> 离子尾 -> 尘埃尾 -> 彗核
                this.drawComa(ctx, v);
                this.drawIonTail(ctx, v);
                this.drawAnimatedDustTail(ctx, v);
                this.drawNucleus(ctx, v);

                ctx.restore();
            }

            drawComa(ctx, v) {
                ctx.save();
                const pulse = 1 + Math.sin(this.time * 0.8) * 0.05;
                const layers = [
                    { r0: 0, r1: 90 * pulse, stops: [[0, 255, 255, 255, 0.45], [0.1, 255, 248, 220, 0.35], [0.35, 180, 210, 255, 0.18], [1, 80, 120, 200, 0]] },
                    { r0: 20, r1: 180 * pulse, stops: [[0, 255, 245, 230, 0.10], [0.5, 200, 220, 255, 0.05], [1, 120, 160, 220, 0]] }
                ];
                layers.forEach(({ r0, r1, stops }) => {
                    const g = ctx.createRadialGradient(0, 0, r0, 0, 0, r1);
                    stops.forEach(([p, r, g_, b, a]) => g.addColorStop(p, `rgba(${r}, ${g_}, ${b}, ${a * v})`));
                    ctx.fillStyle = g;
                    ctx.beginPath();
                    ctx.arc(0, 0, r1, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.restore();
            }

            drawIonTail(ctx, v) {
                ctx.save();
                ctx.rotate(0.18);

                const ionLength = CONFIG.comet.draw.ionLength;
                const wave1 = Math.sin(this.time * 0.4) * 12;
                const wave2 = Math.cos(this.time * 0.6) * 18;
                const alpha = this.params.ionAlpha * v;

                // 时间色彩偏移：蓝↔紫
                const colorShift = Math.sin(this.time * 0.3) * 0.5 + 0.5; // 0~1
                const r1 = Math.round(180 - colorShift * 40);  // 140~180
                const g1 = Math.round(210 - colorShift * 50);  // 160~210
                const r2 = Math.round(120 - colorShift * 30);  // 90~120
                const g2 = Math.round(160 - colorShift * 60);  // 100~160

                const ionGradient = ctx.createLinearGradient(0, -20, ionLength, 20);
                ionGradient.addColorStop(0, `rgba(${r1}, ${g1}, 255, ${alpha * 0.8})`);
                ionGradient.addColorStop(0.2, `rgba(${r2}, ${g2}, 255, ${alpha * 0.4})`);
                ionGradient.addColorStop(0.5, `rgba(100, 120, 255, ${alpha * 0.15})`);
                ionGradient.addColorStop(1, 'rgba(60, 80, 200, 0)');

                ctx.beginPath();
                ctx.moveTo(0, -4);
                ctx.quadraticCurveTo(ionLength * 0.4, -18 + wave1, ionLength, wave2);
                ctx.quadraticCurveTo(ionLength * 0.4, 10 + wave1, 0, 4);
                ctx.fillStyle = ionGradient;
                ctx.fill();

                const coreGrad = ctx.createLinearGradient(0, 0, ionLength * 0.7, 0);
                coreGrad.addColorStop(0, `rgba(200, 230, 255, ${alpha})`);
                coreGrad.addColorStop(0.4, `rgba(${r2 + 20}, ${g2 + 10}, 255, ${alpha * 0.3})`);
                coreGrad.addColorStop(1, 'rgba(80, 100, 200, 0)');
                ctx.beginPath();
                ctx.moveTo(0, -1);
                ctx.quadraticCurveTo(ionLength * 0.5, -8 + wave1 * 0.5, ionLength * 0.8, wave2 * 0.3);
                ctx.quadraticCurveTo(ionLength * 0.5, 4 + wave1 * 0.5, 0, 1);
                ctx.fillStyle = coreGrad;
                ctx.fill();

                ctx.restore();
            }

            drawAnimatedDustTail(ctx, v) {
                ctx.save();
                const dustAlpha = this.params.dustAlpha * v;

                // 尘埃尾弯曲参数：50%向左凸，50%向右凸
                const curveDir = this.dustTailCurveDir;
                const curveStrength = 200; // 弯曲强度（增大以产生明显弧度）

                // 1. 尘埃尾的整体体积光晕（带弯曲的扇形扩散）
                const tailLength = CONFIG.comet.draw.dustTailLength;
                const spread = this.params.spread;
                const baseWave = Math.sin(this.time * 0.5) * this.params.waveSize * 0.4;

                const volumeGrad = ctx.createLinearGradient(0, 0, tailLength, 0);
                volumeGrad.addColorStop(0, `rgba(220, 245, 255, ${dustAlpha * 0.5})`);
                volumeGrad.addColorStop(0.2, `rgba(180, 220, 245, ${dustAlpha * 0.25})`);
                volumeGrad.addColorStop(0.6, `rgba(140, 190, 230, ${dustAlpha * 0.1})`);
                volumeGrad.addColorStop(1, 'rgba(100, 160, 210, 0)');

                ctx.fillStyle = volumeGrad;
                ctx.beginPath();
                ctx.moveTo(0, 0);
                // 上边缘带弯曲 - 在X方向弯曲（左右凸出）
                const topCpX = tailLength * 0.35 + curveStrength * curveDir * 0.25;
                const topCpY = tailLength * 0.35 * spread + baseWave;
                const topEndX = tailLength + curveStrength * curveDir;
                const topEndY = tailLength * 0.18 * spread + baseWave;
                ctx.quadraticCurveTo(topCpX, topCpY, topEndX, topEndY);
                // 下边缘带弯曲
                const botEndX = tailLength + curveStrength * curveDir;
                const botEndY = -tailLength * 0.12 * spread + baseWave;
                ctx.lineTo(botEndX, botEndY);
                const botCpX = tailLength * 0.35 + curveStrength * curveDir * 0.25;
                const botCpY = -tailLength * 0.15 * spread;
                ctx.quadraticCurveTo(botCpX, botCpY, 0, 0);
                ctx.fill();

                // 2. 尘埃丝线 - 带弯曲的飘落感
                this.dustStrands.forEach(strand => {
                    const currentAngle = strand.angleOffset * spread;

                    const wind = Math.sin(this.time * 0.7 + strand.phase * 0.5) * this.params.waveSize;
                    const flutter = Math.sin(this.time * 1.2 + strand.phase) * (this.params.waveSize * 0.3);
                    const waveOffset = wind + flutter;

                    const gravityDrop = strand.length * 0.18;

                    const baseEndX = strand.length * Math.cos(currentAngle);
                    const baseEndY = strand.length * Math.sin(currentAngle) + gravityDrop;

                    const progress = strand.length / tailLength;
                    const curveOffset = curveStrength * curveDir * (progress * progress);

                    const endX = baseEndX + curveOffset;
                    const endY = baseEndY + waveOffset;

                    const cpProgress = 0.5;
                    const cpCurveOffset = curveStrength * curveDir * (cpProgress * cpProgress);
                    const cpX = strand.length * cpProgress * Math.cos(currentAngle) + wind * 0.3 + cpCurveOffset;
                    const cpY = strand.length * cpProgress * Math.sin(currentAngle) + gravityDrop * cpProgress + wind * 0.5;

                    ctx.beginPath();
                    ctx.moveTo(0, 0);
                    ctx.quadraticCurveTo(cpX, cpY, endX, endY);

                    // 3 组共享色彩，增加视觉丰富度
                    const colorIdx = Math.floor(strand.phase * 3) % 3;
                    const a = strand.alpha * 0.8 * v;
                    const strandColors = [
                        `rgba(190, 225, 245, ${a})`,
                        `rgba(210, 215, 250, ${a})`,
                        `rgba(175, 235, 240, ${a})`
                    ];
                    ctx.strokeStyle = strandColors[colorIdx];
                    ctx.lineWidth = strand.lineWidth * (0.6 + 0.4 * v);
                    ctx.lineCap = 'round';
                    ctx.stroke();
                });

                // 3. 彗尾边缘的弥散光点（带X方向弯曲）
                ctx.globalCompositeOperation = 'lighter';
                for (let i = 0; i < 30; i++) {
                    const t = (i / 30) * 0.8 + 0.1;
                    // 根据距离计算X方向弯曲偏移
                    const curveOffset = curveStrength * curveDir * t * t;
                    const px = t * tailLength + curveOffset + (Math.random() - 0.5) * 40;
                    const py = (Math.random() - 0.5) * t * tailLength * 0.3 * spread + baseWave * t;
                    const size = (1 - t) * 3 + 0.5;
                    const pa = (1 - t) * dustAlpha * 0.5;
                    ctx.fillStyle = `rgba(200, 235, 255, ${pa})`;
                    ctx.beginPath();
                    ctx.arc(px, py, size, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }

            drawNucleus(ctx, v) {
                ctx.save();
                const coreGradient = ctx.createRadialGradient(0, 0, 0, 0, 0, 40);
                coreGradient.addColorStop(0, `rgba(220, 245, 255, ${0.7 * v})`);
                coreGradient.addColorStop(0.15, `rgba(180, 220, 255, ${0.6 * v})`);
                coreGradient.addColorStop(0.4, `rgba(100, 160, 255, ${0.25 * v})`);
                coreGradient.addColorStop(1, 'rgba(40, 80, 180, 0)');

                ctx.fillStyle = coreGradient;
                ctx.beginPath();
                ctx.arc(0, 0, 40, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        const cometPool = new ObjectPool(
            () => new Comet(),
            (comet) => comet.reset()
        );

        // 流星池
        const meteorPool = new ObjectPool(
            () => new Meteor(),
            (meteor, targetX, targetY) => meteor.reset(targetX, targetY)
        );

        // 流星雨 - 带有辐射点，所有流星向辐射点汇聚
        class MeteorShower {
            constructor(targetX = null, targetY = null) {
                const ms = CONFIG.meteor.shower;
                this.meteors = [];
                this.active = true;
                this.spawnTimer = 0;
                this.maxMeteors = ms.maxMeteors.min + Math.floor(Math.random() * (ms.maxMeteors.max - ms.maxMeteors.min));
                this.spawnedCount = 0;

                const w = starsCanvas?.width || 800;
                const h = starsCanvas?.height || 500;

                // 辐射点随机化：以点击位置为基准偏移，或完全随机
                if (targetX !== null && targetY !== null) {
                    this.radiantX = targetX + (Math.random() - 0.5) * ms.radiantOffset * 2;
                    this.radiantY = targetY + (Math.random() - 0.5) * ms.radiantOffset * 2;
                } else {
                    this.radiantX = Math.random() * w;
                    this.radiantY = Math.random() * h * 0.85;
                }

                // 限制辐射点在画布内
                this.radiantX = Math.max(40, Math.min(w - 40, this.radiantX));
                this.radiantY = Math.max(40, Math.min(h - 40, this.radiantY));
            }
            update() {
                if (!this.active) return;
                this.spawnTimer++;

                if (this.spawnTimer % CONFIG.meteor.shower.spawnInterval === 0 && this.spawnedCount < this.maxMeteors) {
                    const m = meteorPool.acquire();
                    m.resetRadiant(this.radiantX, this.radiantY);
                    this.meteors.push(m);
                    this.spawnedCount++;
                }

                for (let i = this.meteors.length - 1; i >= 0; i--) {
                    const m = this.meteors[i];
                    m.update();
                    if (!m.active) {
                        meteorPool.release(m);
                        this.meteors.splice(i, 1);
                    }
                }

                if (this.spawnedCount >= this.maxMeteors && this.meteors.length === 0) {
                    this.active = false;
                }
            }
            draw(ctx) {
                this.meteors.forEach(m => m.draw(ctx));
            }
        }

        let vignetteCache = null;
        let vignetteSize = { w: 0, h: 0 };

        function drawVignette() {
            const w = starsCanvas.width;
            const h = starsCanvas.height;
            const size = Math.min(w, h) * 0.12;

            if (!vignetteCache || vignetteSize.w !== w || vignetteSize.h !== h) {
                if (!vignetteCache) {
                    vignetteCache = document.createElement('canvas');
                }
                vignetteCache.width = w;
                vignetteCache.height = h;
                const vctx = vignetteCache.getContext('2d');
                const edges = [
                    { x1: 0, y1: 0, x2: 0, y2: size, rx: 0, ry: 0, rw: w, rh: size, a0: 0.5, a1: 0 },
                    { x1: 0, y1: h - size, x2: 0, y2: h, rx: 0, ry: h - size, rw: w, rh: size, a0: 0, a1: 0.6 },
                    { x1: 0, y1: 0, x2: size, y2: 0, rx: 0, ry: 0, rw: size, rh: h, a0: 0.4, a1: 0 },
                    { x1: w - size, y1: 0, x2: w, y2: 0, rx: w - size, ry: 0, rw: size, rh: h, a0: 0, a1: 0.4 }
                ];
                edges.forEach(e => {
                    const g = vctx.createLinearGradient(e.x1, e.y1, e.x2, e.y2);
                    g.addColorStop(0, `rgba(0,0,0,${e.a0})`);
                    g.addColorStop(1, `rgba(0,0,0,${e.a1})`);
                    vctx.fillStyle = g;
                    vctx.fillRect(e.rx, e.ry, e.rw, e.rh);
                });
                vignetteSize = { w, h };
            }

            starsCtx.drawImage(vignetteCache, 0, 0);
        }

        const autoSpawn = {
            meteor: 0,
            comet: 0,
            cometDisappearedAt: 0, // 彗星消失的时间
            cometNextInterval: (CONFIG.comet.spawnInterval.min + Math.random() * (CONFIG.comet.spawnInterval.max - CONFIG.comet.spawnInterval.min)) || 5000, // 首次生成延迟
            cometWasActive: false, // 记录上一帧是否有彗星
            shower: 0,
            bird: 0, // 鸟儿自动生成时间戳
            birdNextInterval: 0, // 下次生成间隔
            wind: 0 // 风自动生成时间戳
        };

        // 鼠标交互星座连线函数 - 鼠标靠近时显示完整星座全貌
        function drawMouseConstellation() {
            if (!mouseEnteredStars || !stars.constellations || !stars.constellationStars) return;

            // 使用 targetMousePos 避免平滑插值带来的延迟
            const mx = targetMousePos.x * starsCanvas.width;
            const my = targetMousePos.y * starsCanvas.height;

            // 使用 initStars 中预缓存的星座分组与映射，避免每帧重建临时对象
            const starDataMap = stars.constellationStarDataMap || {};
            const starNameToRenderStar = stars.constellationStarMap || {};
            const cachedGroups = stars.cachedConstellationGroups;
            if (!cachedGroups) return;

            const activationRadius = 30;
            let nearestConstellation = null;
            let nearestDist = Infinity;

            Object.values(cachedGroups).forEach(group => {
                let groupMinDist = Infinity;

                group.stars.forEach(starName => {
                    const starData = starDataMap[starName];
                    if (!starData) return;
                    const dx = starData.x - mx;
                    const dy = starData.y - my;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < groupMinDist) {
                        groupMinDist = dist;
                    }
                });

                if (groupMinDist < activationRadius && groupMinDist < nearestDist) {
                    nearestDist = groupMinDist;
                    nearestConstellation = group;
                }
            });

            if (!nearestConstellation) return;

            // 计算激活强度
            const intensity = 1 - (nearestDist / activationRadius);

            starsCtx.save();
            starsCtx.lineCap = 'round';
            starsCtx.lineJoin = 'round';

            // 绘制该星座的所有连线（完整全貌）
            nearestConstellation.lines.forEach(line => {
                starsCtx.beginPath();
                let pathStarted = false;

                for (let i = 0; i < line.length - 1; i++) {
                    const s1 = starDataMap[line[i]];
                    const s2 = starDataMap[line[i + 1]];
                    if (!s1 || !s2) continue;

                    if (!pathStarted) {
                        starsCtx.moveTo(s1.x, s1.y);
                        pathStarted = true;
                    }
                    starsCtx.lineTo(s2.x, s2.y);
                }

                // 童话绘本风暖色连线：低饱和暖白，柔和而不刺眼
                const baseAlpha = 0.35 + intensity * 0.35;
                starsCtx.strokeStyle = `rgba(245, 235, 210, ${baseAlpha})`;
                starsCtx.lineWidth = 1.2 + intensity * 1.0;
                starsCtx.stroke();

                // 柔和 pastel 发光
                if (intensity > 0.3) {
                    starsCtx.save();
                    starsCtx.strokeStyle = `rgba(255, 240, 220, ${intensity * 0.12})`;
                    starsCtx.lineWidth = 3;
                    starsCtx.stroke();
                    starsCtx.restore();
                }
            });

            // 高亮该星座的所有星星
            nearestConstellation.stars.forEach(starName => {
                const star = starNameToRenderStar[starName];
                if (!star) return;

                const r = star.color.r;
                const g = star.color.g;
                const b = star.color.b;

                // 外层光晕（更紧实）
                const outerGlow = starsCtx.createRadialGradient(
                    star.x, star.y, 0,
                    star.x, star.y, star.size * 3
                );
                outerGlow.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${0.22 + intensity * 0.16})`);
                outerGlow.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${0.06 + intensity * 0.06})`);
                outerGlow.addColorStop(1, 'rgba(0,0,0,0)');
                starsCtx.fillStyle = outerGlow;
                starsCtx.beginPath();
                starsCtx.arc(star.x, star.y, star.size * 3, 0, Math.PI * 2);
                starsCtx.fill();

                // 内层增强光晕
                const innerGlow = starsCtx.createRadialGradient(
                    star.x, star.y, 0,
                    star.x, star.y, star.size * 1.6
                );
                innerGlow.addColorStop(0, `rgba(255, 255, 255, ${0.45 + intensity * 0.12})`);
                innerGlow.addColorStop(0.5, `rgba(${r}, ${g}, ${b}, ${0.22 + intensity * 0.12})`);
                innerGlow.addColorStop(1, 'rgba(0,0,0,0)');
                starsCtx.fillStyle = innerGlow;
                starsCtx.beginPath();
                starsCtx.arc(star.x, star.y, star.size * 1.6, 0, Math.PI * 2);
                starsCtx.fill();

                // 星星本体增亮
                starsCtx.fillStyle = `rgba(255, 255, 255, ${0.65 + intensity * 0.1})`;
                starsCtx.beginPath();
                starsCtx.arc(star.x, star.y, star.size * (0.8 + intensity * 0.4), 0, Math.PI * 2);
                starsCtx.fill();
            });

            // 显示星座名称（童话绘本风：手写体、柔和 pastel、温润不刺眼）
            if (intensity > 0.3 && nearestConstellation.labelStar) {
                starsCtx.save();
                starsCtx.font = '500 18px "Ma Shan Zheng", "Noto Serif SC", serif';
                starsCtx.fillStyle = `rgba(255, 248, 235, ${intensity * 0.9})`;
                starsCtx.textAlign = 'center';
                starsCtx.shadowColor = 'rgba(180, 140, 100, 0.3)';
                starsCtx.shadowBlur = 3;
                starsCtx.shadowOffsetX = 0;
                starsCtx.shadowOffsetY = 1;
                const labelPadding = 28;
                const labelMinY = 22;
                const labelMaxY = starsCanvas.height - 14;

                let labelY = nearestConstellation.labelStar.y - labelPadding;
                if (labelY < labelMinY) {
                    labelY = nearestConstellation.labelStar.y + labelPadding;
                }
                labelY = Math.max(labelMinY, Math.min(labelMaxY, labelY));

                starsCtx.textBaseline = labelY > nearestConstellation.labelStar.y ? 'top' : 'bottom';
                starsCtx.fillText(nearestConstellation.name, nearestConstellation.centerX, labelY);
                starsCtx.restore();
            }

            starsCtx.restore();
        }

        // 绘制八角星芒（8方向，主星芒长，次星芒短，更明亮）
        function drawStarSpikes(star, opacity, r, g, b) {
            const { x, y } = star;
            const scale = 3.0; // 星芒固定视觉基准，与星星本身尺寸解耦
            const mainSpikeLen = scale * 6.5;
            const subSpikeLen = scale * 3.8;
            const spikeOpacity = opacity * 0.88;
            const glowSize = scale * 1.6;

            starsCtx.save();
            starsCtx.translate(x, y);
            starsCtx.globalAlpha = spikeOpacity;

            const glowGrad = starsCtx.createRadialGradient(0, 0, 0, 0, 0, glowSize);
            glowGrad.addColorStop(0, `rgba(${r}, ${g}, ${b}, 0.55)`);
            glowGrad.addColorStop(0.45, `rgba(${r}, ${g}, ${b}, 0.12)`);
            glowGrad.addColorStop(1, 'rgba(255, 255, 255, 0)');
            starsCtx.fillStyle = glowGrad;
            starsCtx.beginPath();
            starsCtx.arc(0, 0, glowSize, 0, Math.PI * 2);
            starsCtx.fill();

            const mainGrad = starsCtx.createLinearGradient(0, 0, mainSpikeLen, 0);
            mainGrad.addColorStop(0, `rgba(${r}, ${g}, ${b}, 1)`);
            mainGrad.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, 0.6)`);
            mainGrad.addColorStop(0.8, `rgba(${r}, ${g}, ${b}, 0.2)`);
            mainGrad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

            const subGrad = starsCtx.createLinearGradient(0, 0, subSpikeLen, 0);
            subGrad.addColorStop(0, `rgba(${r}, ${g}, ${b}, 1)`);
            subGrad.addColorStop(0.4, `rgba(${r}, ${g}, ${b}, 0.6)`);
            subGrad.addColorStop(0.8, `rgba(${r}, ${g}, ${b}, 0.2)`);
            subGrad.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

            starsCtx.lineCap = 'round';
            for (let i = 0; i < 8; i++) {
                const isMain = i % 2 === 0;
                const spikeLen = isMain ? mainSpikeLen : subSpikeLen;
                const lineWidth = isMain ? scale * 0.22 : scale * 0.12;
                const grad = isMain ? mainGrad : subGrad;
                const angle = (Math.PI / 4) * i;

                starsCtx.rotate(angle);
                starsCtx.strokeStyle = grad;
                starsCtx.lineWidth = lineWidth;
                starsCtx.beginPath();
                starsCtx.moveTo(scale * 0.2, 0);
                starsCtx.lineTo(spikeLen, 0);
                starsCtx.stroke();
                starsCtx.rotate(-angle);
            }

            starsCtx.restore();
        }

        function drawStars() {
            if (TimeState.isDay) {
                meteors.forEach(m => meteorPool.release(m));
                meteors.length = 0;
                activeShowers.forEach(shower => {
                    shower.meteors.forEach(m => meteorPool.release(m));
                });
                activeShowers.length = 0;
            }
            if (TimeState.starsReveal < 0.05) {
                activeComets.forEach(c => cometPool.release(c));
                activeComets.length = 0;
            }
            starsCtx.clearRect(0, 0, starsCanvas.width, starsCanvas.height);

            const reveal = TimeState.starsReveal;
            const bgAlpha = Math.min(1, reveal * 1.2);
            starsCtx.fillStyle = `rgba(8, 10, 22, ${bgAlpha})`;
            starsCtx.fillRect(0, 0, starsCanvas.width, starsCanvas.height);

            const now = performance.now();
            if (!prefersReducedMotion && !TimeState.isDay) {
                if (now - autoSpawn.meteor >= CONFIG.meteor.autoInterval) {
                    autoSpawn.meteor = now;
                    meteors.push(meteorPool.acquire());
                }
                const hasActiveComet = activeComets.length > 0;
                const cs = CONFIG.comet.spawnInterval;
                if (autoSpawn.cometWasActive && !hasActiveComet) {
                    autoSpawn.cometDisappearedAt = now;
                    autoSpawn.cometNextInterval = cs.min + Math.random() * (cs.max - cs.min);
                }
                if (!hasActiveComet && autoSpawn.cometDisappearedAt > 0 &&
                    now - autoSpawn.cometDisappearedAt >= autoSpawn.cometNextInterval) {
                    autoSpawn.cometDisappearedAt = 0;
                    activeComets.push(cometPool.acquire());
                }
                if (!hasActiveComet && autoSpawn.cometDisappearedAt === 0 && !autoSpawn.cometInitialized) {
                    if (now - pageStartTime >= autoSpawn.cometNextInterval) {
                        autoSpawn.cometInitialized = true;
                        activeComets.push(cometPool.acquire());
                    }
                }
                autoSpawn.cometWasActive = hasActiveComet;
                if (now - autoSpawn.shower >= CONFIG.meteor.shower.cooldown * 8) {
                    autoSpawn.shower = now;
                    activeShowers.push(new MeteorShower(
                        Math.random() * starsCanvas.width,
                        Math.random() * starsCanvas.height
                    ));
                }
            }

            stars.forEach(star => {
                const isConstellation = !!star.constellationName;
                if (!prefersReducedMotion && !isConstellation) {
                    star.twinklePhase += star.twinkleSpeed;
                }
                const breathe = isConstellation ? 1 : Math.sin(star.twinklePhase) * 0.3 + 0.7;
                let blinkFade = 1;
                if (!isConstellation) {
                    const blinkPhase = star.twinklePhase * 2.5 + star.x * 0.02;
                    const blinkRaw = Math.sin(blinkPhase);
                    if (blinkRaw < -0.55) {
                        blinkFade = 0;
                    } else if (blinkRaw < -0.15) {
                        const t = (blinkRaw + 0.55) / 0.4;
                        blinkFade = t * t * (3 - 2 * t);
                    }
                }
                star.currentOpacity = star.brightness * breathe * blinkFade;

                if (reveal > 0.01) {
                    const sunSX = TimeState.sunPosition.x * starsCanvas.width;
                    const sunSY = TimeState.sunPosition.y * starsCanvas.height;
                    const dxS = star.x - sunSX;
                    const dyS = star.y - sunSY;
                    const distFromSun = Math.sqrt(dxS * dxS + dyS * dyS);
                    const maxDist = Math.sqrt(starsCanvas.width * starsCanvas.width + starsCanvas.height * starsCanvas.height);
                    const normalizedDist = distFromSun / maxDist;
                    const transitionStrength = reveal < 0.98 ? (1 - Math.abs(reveal - 0.5) * 2) : 0;
                    const directionalBias = (normalizedDist - 0.35) * transitionStrength * 0.7;
                    const effectiveReveal = Math.min(1, Math.max(0, reveal + directionalBias));
                    star.currentOpacity *= effectiveReveal;
                } else {
                    star.currentOpacity = 0;
                }

                if (star.currentOpacity <= 0.001) return;

                const { color, x, y, currentOpacity: opacity } = star;
                const baseRadius = 1.0; // 统一绘制尺寸

                starsCtx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
                starsCtx.beginPath();
                starsCtx.arc(x, y, baseRadius, 0, Math.PI * 2);
                starsCtx.fill();

                // 亮星加八角星芒（亮度决定，不再是大小）
                if (opacity > CONFIG.stars.spikeThreshold) {
                    drawStarSpikes(star, opacity, color.r, color.g, color.b);
                }
            });

            // 鼠标交互：鼠标附近的星星连线成星座
            drawMouseConstellation();

            // 更新和绘制流星雨（倒序遍历避免 splice 跳帧）
            for (let i = activeShowers.length - 1; i >= 0; i--) {
                const shower = activeShowers[i];
                shower.update();
                shower.draw(starsCtx);
                if (!shower.active) activeShowers.splice(i, 1);
            }

            // 更新和绘制彗星（倒序遍历）
            for (let i = activeComets.length - 1; i >= 0; i--) {
                const comet = activeComets[i];
                comet.update();
                comet.draw(starsCtx);
                if (!comet.active) {
                    if (comet._pool) comet._pool.release(comet);
                    activeComets.splice(i, 1);
                }
            }

            // 更新和绘制普通流星（倒序遍历 + 归还对象池）
            for (let i = meteors.length - 1; i >= 0; i--) {
                const meteor = meteors[i];
                meteor.update();
                meteor.draw(starsCtx);
                if (!meteor.active) {
                    meteorPool.release(meteor);
                    meteors.splice(i, 1);
                }
            }

            // 边缘虚化
            drawVignette();
        }

        // DOM 元素安全清理工具 - 防止内存泄漏
        const prefersReducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

        // ============================================
        // 点击彩蛋系统 - 带冷却限制
        // ============================================
        const COOLDOWN = {
            meteor: CONFIG.meteor.clickCooldown,
            comet: CONFIG.comet.clickCooldown,
            shower: CONFIG.meteor.shower.cooldown
        };
        const lastSpawn = {
            meteor: 0,
            comet: 0,
            shower: 0
        };

        // 双击处理流星雨
        starsCanvas.addEventListener('dblclick', (e) => {
            if (!TimeState.isDay) {
                const x = e.clientX;
                const y = e.clientY;

                if (prefersReducedMotion) return;

                const now = performance.now();
                if (now - lastSpawn.shower >= COOLDOWN.shower) {
                    lastSpawn.shower = now;
                    activeShowers.push(new MeteorShower(x, y));
                }
            }
        });

        // 触摸双击（双指快速连点）触发流星雨
        let _lastStarsTouchTime = 0;
        let _lastStarsTouchX = 0;
        let _lastStarsTouchY = 0;
        starsCanvas.addEventListener('touchend', (e) => {
            if (TimeState.isDay || prefersReducedMotion || e.changedTouches.length === 0) return;
            const t = e.changedTouches[0];
            const now = performance.now();
            const dx = t.clientX - _lastStarsTouchX;
            const dy = t.clientY - _lastStarsTouchY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (now - _lastStarsTouchTime < 400 && dist < 40) {
                if (now - lastSpawn.shower >= COOLDOWN.shower) {
                    lastSpawn.shower = now;
                    activeShowers.push(new MeteorShower(t.clientX, t.clientY));
                }
            }
            _lastStarsTouchTime = now;
            _lastStarsTouchX = t.clientX;
            _lastStarsTouchY = t.clientY;
        }, { passive: true });

        // 单击处理流星和彗星（touchend 提前响应，避免移动端 300ms 延迟）
        function spawnMeteorOrComet(x, y) {
            if (TimeState.isDay || prefersReducedMotion) return;
            const now = performance.now();
            const rand = Math.random();

            // 彗星（5% 概率，独立于流星冷却），且当前没有活跃彗星
            if (rand < 0.05 && activeComets.length === 0) {
                if (now - lastSpawn.comet >= COOLDOWN.comet) {
                    lastSpawn.comet = now;
                    activeComets.push(cometPool.acquire());
                    return;
                }
            }

            // 普通流星（受冷却限制）
            if (now - lastSpawn.meteor >= COOLDOWN.meteor) {
                lastSpawn.meteor = now;
                meteors.push(meteorPool.acquire(x, y));
            }
        }

        starsCanvas.addEventListener('click', (e) => spawnMeteorOrComet(e.clientX, e.clientY));
        starsCanvas.addEventListener('touchend', (e) => {
            if (prefersReducedMotion || e.changedTouches.length === 0) return;
            const t = e.changedTouches[0];
            const dx = t.clientX - _lastStarsTouchX;
            const dy = t.clientY - _lastStarsTouchY;
            const dist = Math.sqrt(dx * dx + dy * dy);
            // 避免与双触连点冲突：连点已在同一 touchend 流处理，这里确保不是连点的第二次触发
            if (performance.now() - _lastStarsTouchTime >= 400 || dist >= 40) {
                spawnMeteorOrComet(t.clientX, t.clientY);
            }
        }, { passive: true });

        // ============================================
        // 鸟群系统（支持对象池复用）
        // ============================================
        class Bird {
            constructor() {
                this.x = 0; this.y = 0; this.z = 0;
                this.vx = 0; this.vy = 0; this.vz = 0;
                this.angle = 0;
                this.wing = 0;
                this.wingSpeed = 0;
                this.spawnProgress = 0;
                this.baseSize = 24;
                this.active = false;
                this.opacity = 1;
                this.palette = null;
                this.flightOffset = 0;
                this.flightAmplitude = 0;
                this.flightFrequency = 0;
                this.canFlyOutOfFrame = false;
                this.wiggleOffset = 0;
                this.originalVx = 0;
                this.originalVy = 0;
                this.originalVz = 0;

                // 新增属性
                this.flightMode = 'direct';
                this.flapIntensity = 1.0;
                this.wingAngle = 0;
                this.glidePhase = 0;
                this.timeOffset = 0;

                // 速度平滑
                this.targetVx = 0;
                this.targetVy = 0;
                this.targetVz = 0;
            }

            reset(pos, canFlyOutOfFrame = false) {
                const bc = CONFIG.bird;
                this.canFlyOutOfFrame = canFlyOutOfFrame;
                this.x = pos.x;
                this.y = pos.y;
                this.z = (Math.random() - 0.5) * 400;

                const angle = Math.random() * Math.PI * 2;
                const speed = bc.baseSpeed.min + Math.random() * (bc.baseSpeed.max - bc.baseSpeed.min);
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed * 0.6;
                this.vz = (Math.random() - 0.5) * 1.5;
                this.originalVx = this.vx;
                this.originalVy = this.vy;
                this.originalVz = this.vz;

                this.wing = 0;
                this.baseSize = bc.size.min + Math.random() * (bc.size.max - bc.size.min);

                // 大鸟扑翼慢，小鸟扑翼快
                const sizeRatio = (this.baseSize - bc.size.min) / (bc.size.max - bc.size.min);
                this.wingSpeed = bc.wingSpeed.max - sizeRatio * (bc.wingSpeed.max - bc.wingSpeed.min);

                this.spawnProgress = 0;
                this.active = true;
                this.opacity = 1;
                this.wiggleOffset = Math.random() * Math.PI * 2;
                this.flightOffset = Math.random() * Math.PI * 2;
                this.flightAmplitude = bc.flightAmp.min + Math.random() * (bc.flightAmp.max - bc.flightAmp.min);
                this.flightFrequency = bc.flightFreq.min + Math.random() * (bc.flightFreq.max - bc.flightFreq.min);

                this.palette = BIRD_PALETTES[Math.floor(Math.random() * BIRD_PALETTES.length)];

                // 随机分配飞行模式，减少特殊模式概率
                const modeRand = Math.random();
                if (modeRand < 0.6) this.flightMode = 'direct'; // 60% 直线
                else if (modeRand < 0.85) this.flightMode = 'wave'; // 25% 波浪
                else this.flightMode = 'glide'; // 15% 滑翔
                // 移除 circle 模式

                this.flapIntensity = 1.0;
                this.wingAngle = 0;
                this.glidePhase = Math.random() * Math.PI * 2; // 随机起始相位
                this.timeOffset = Math.random() * 1000; // 独立时间偏移
            }

            update(time, dt = 1) {
                if (!this.active) return;

                if (this.spawnProgress < 1) this.spawnProgress += 0.04 * dt;

                // 使用独立时间
                const localTime = time + this.timeOffset;

                // 根据飞行模式计算目标速度
                switch (this.flightMode) {
                    case 'wave': // 波浪飞行：扑翼上升，滑翔下降
                        this.glidePhase += 0.015 * dt;
                        const isFlapping = Math.sin(this.glidePhase) > 0;
                        this.flapIntensity = isFlapping ? 1.0 : 0.3;

                        // 轻微的上下波动
                        const waveInfluence = Math.sin(this.glidePhase) * 0.08;
                        this.targetVx = this.originalVx;
                        this.targetVy = this.originalVy + waveInfluence;
                        this.targetVz = this.originalVz;
                        break;

                    case 'glide': // 滑翔：翅膀展开，平稳飞行
                        this.flapIntensity = 0.25;

                        // 轻微下沉
                        this.targetVx = this.originalVx;
                        this.targetVy = this.originalVy + 0.05;
                        this.targetVz = this.originalVz;
                        break;

                    case 'direct': // 直线飞行，带曲线
                    default:
                        this.flapIntensity = 1.0;

                        // 使用独立时间和独立频率的曲线飞行
                        const curveX = Math.sin(localTime * 0.001 * this.flightFrequency + this.flightOffset) * this.flightAmplitude;
                        const curveY = Math.cos(localTime * 0.001 * this.flightFrequency * 0.7 + this.flightOffset) * this.flightAmplitude * 0.5;
                        const curveZ = Math.sin(localTime * 0.001 * this.flightFrequency * 0.5 + this.flightOffset * 1.3) * this.flightAmplitude * 0.3;

                        this.targetVx = this.originalVx + curveX;
                        this.targetVy = this.originalVy + curveY;
                        this.targetVz = this.originalVz + curveZ;
                        break;
                }

                // 平滑插值到目标速度（缓动），用 dt 补偿
                const smoothFactor = 1 - Math.pow(1 - 0.08, dt);
                this.vx += (this.targetVx - this.vx) * smoothFactor;
                this.vy += (this.targetVy - this.vy) * smoothFactor;
                this.vz += (this.targetVz - this.vz) * smoothFactor;

                // 限制每只鸟的速度变化范围（相对于基准速度）
                const baseSpeed = Math.sqrt(this.originalVx * this.originalVx + this.originalVy * this.originalVy);
                const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                const speedDiff = currentSpeed - baseSpeed;

                if (Math.abs(speedDiff) > CONFIG.bird.maxSpeedVariation) {
                    const clampedSpeed = baseSpeed + Math.sign(speedDiff) * CONFIG.bird.maxSpeedVariation;
                    const scale = clampedSpeed / currentSpeed;
                    this.vx *= scale;
                    this.vy *= scale;
                }

                // 限制绝对最大速度
                const spd = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                if (spd > CONFIG.bird.maxSpeed) {
                    this.vx = (this.vx / spd) * CONFIG.bird.maxSpeed;
                    this.vy = (this.vy / spd) * CONFIG.bird.maxSpeed;
                }

                // 位移乘以 dt，帧率低时步长更大，保持视觉速度恒定
                this.x += this.vx * dt;
                this.y += this.vy * dt;
                this.z += this.vz * dt;
                this.angle = Math.atan2(this.vy, this.vx);

                // 深度影响
                this.depthScale = 1.0 + this.z / 400;
                const depthFade = Math.max(0.3, Math.min(1.0, this.depthScale));                const w = window.innerWidth, h = window.innerHeight;
                const fm = this.canFlyOutOfFrame ? CONFIG.bird.fadeMargin : 0;
                const fw = CONFIG.bird.fadeWidth;
                let fade = 1;
                if (this.x < -fm) fade = Math.max(0, 1 - (-this.x - fm) / fw);
                else if (this.x > w + fm) fade = Math.max(0, 1 - (this.x - w - fm) / fw);
                if (this.y < -fm) fade = Math.min(fade, Math.max(0, 1 - (-this.y - fm) / fw));
                else if (this.y > h + fm) fade = Math.min(fade, Math.max(0, 1 - (this.y - h - fm) / fw));

                if (this.z < -300) fade = Math.min(fade, Math.max(0, 1 - (-this.z - 300) / fw));
                else if (this.z > 300) fade = Math.min(fade, Math.max(0, 1 - (this.z - 300) / fw));

                this.opacity = fade * depthFade;
                if (this.opacity <= 0) { this.active = false; return; }

                this.wing += this.wingSpeed * this.flapIntensity * dt;
                this.wiggleOffset += 0.15 * dt;

                // 夜间自然淡出
                if (!TimeState.isDay) {
                    const nightFade = Math.max(0, 1 - TimeState.starsReveal * 1.5);
                    this.opacity *= nightFade;
                    if (this.opacity <= 0.01) {
                        this.active = false;
                    }
                }
            }

            dispose() {
                this.active = false;
                if (this._pool) this._pool.release(this);
            }
        }

        const birds = [];
        const pendingBirds = []; // 帧开始统一 flush 的添加队列
        const birdPool = new ObjectPool(
            () => new Bird(),
            (bird, pos, canFlyOutOfFrame) => bird.reset(pos, canFlyOutOfFrame),
            CONFIG.bird.poolSize
        );

        function addBird(pos, canFlyOutOfFrame = false) {
            if (!TimeState.isDay) return;
            // 竞态修复：不直接操作 birds，先入队，animate 帧起始统一处理
            pendingBirds.push({ pos, canFlyOutOfFrame });
        }

        function flushPendingBirds() {
            while (pendingBirds.length > 0) {
                const { pos, canFlyOutOfFrame } = pendingBirds.shift();
                const bird = birdPool.acquire(pos, canFlyOutOfFrame);
                birds.push(bird);
                // 数量超限处理
                while (birds.length > CONFIG.bird.maxCount) {
                    const removed = birds.shift();
                    removed.dispose();
                }
            }
        }

        skyCanvas.addEventListener('click', (e) => {
            if (TimeState.isDay) {
                if (prefersReducedMotion) return;
                const canFlyOutOfFrame = Math.random() < CONFIG.bird.flyOutProb;
                addBird({ x: e.clientX, y: e.clientY }, canFlyOutOfFrame);
            }
        });

        // 键盘无障碍交互
        document.addEventListener('keydown', (e) => {
            if (e.repeat || prefersReducedMotion) return;
            if (e.ctrlKey || e.altKey || e.metaKey) return;
            if (e.key === 'Enter' && e.shiftKey && !TimeState.isDay) {
                e.preventDefault();
                const now = performance.now();
                if (now - lastSpawn.shower >= COOLDOWN.shower) {
                    lastSpawn.shower = now;
                    activeShowers.push(new MeteorShower(
                        window.innerWidth / 2,
                        window.innerHeight / 2
                    ));
                }
                return;
            }
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                const now = performance.now();
                if (TimeState.isDay) {
                    const canFlyOutOfFrame = Math.random() < CONFIG.bird.flyOutProb;
                    addBird({ x: window.innerWidth / 2, y: window.innerHeight / 2 }, canFlyOutOfFrame);
                } else {
                    if (now - lastSpawn.meteor >= COOLDOWN.meteor) {
                        lastSpawn.meteor = now;
                        meteors.push(meteorPool.acquire(
                            window.innerWidth / 2,
                            window.innerHeight / 2
                        ));
                    }
                }
            }
        });

        // ============================================
        // 初始化与动画
        // ============================================


        // 记录页面开始时间，用于控制鸟儿生成区域（前10秒限制在框内）
        const pageStartTime = performance.now();

        function init() {
            // 创建太阳
            createSun();

            // 创建无障碍播报器
            if (!ariaAnnouncer) {
                ariaAnnouncer = document.createElement('div');
                ariaAnnouncer.className = 'sr-only';
                ariaAnnouncer.setAttribute('aria-live', 'polite');
                ariaAnnouncer.setAttribute('aria-atomic', 'true');
                document.body.appendChild(ariaAnnouncer);
            }

            // 使用 requestAnimationFrame 确保 CSS 布局已完成
            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    resizeRenderer();
                    resizeBirdsCanvas();
                    resizeSurroundCanvas();
                    resizeWindLeafCanvas();
                    resizeStarsCanvas();
                    initStars();
                    updateMaxScroll();

                    // 初始更新一次时间状态（强制提示由 TimeState.update() 在 body 类切换时自动触发）
                    TimeState.update();
                });
            });

            window.addEventListener('resize', () => {
                resizeRenderer();
                resizeBirdsCanvas();
                resizeSurroundCanvas();
                resizeWindLeafCanvas();
                updateMaxScroll();
                const sizeChanged = resizeStarsCanvas();
                if (sizeChanged) {
                    initStars();
                }
            });

        }

        const clock = new THREE.Clock();
        let lastInteraction = performance.now();

        function recordInteraction() {
            lastInteraction = performance.now();
        }
        [skyCanvas, starsCanvas].forEach(el => {
            el.addEventListener('mousedown', recordInteraction);
            el.addEventListener('touchstart', recordInteraction, { passive: true });
        });

        function maybeSpawnHint() {
            if (prefersReducedMotion) return;
            const now = performance.now();
            if (now - lastInteraction < 6000) return; // 活跃时不打扰
            if (TimeState.isDay && birds.length === 0 && Math.random() < 0.003) {
                // 自动提示生成的鸟儿默认不会飞出框外
                addBird({
                    x: Math.random() * window.innerWidth,
                    y: window.innerHeight * 0.1 + Math.random() * window.innerHeight * 0.6
                }, false);
            } else if (!TimeState.isDay && meteors.length === 0 && Math.random() < 0.003) {
                meteors.push(meteorPool.acquire());
            }
        }

        // ============================================
        // 引导提示系统
        // ============================================
        const idleHint = document.getElementById('idleHint');
        const idleHintText = document.getElementById('idleHintText');
        let idleHintTimer = null;
        let idleShowTimer = null;
        const HINT_DISPLAY_MS = 3700;

        let idleHintForced = false;

        function showIdleHint(text, durationMs = HINT_DISPLAY_MS) {
            if (!idleHint || prefersReducedMotion) return;
            idleHintText.textContent = text;
            idleHint.style.display = 'block';
            idleHint.setAttribute('aria-hidden', 'false');
            void idleHint.offsetWidth;
            idleHint.classList.add('visible');
            clearTimeout(idleShowTimer);
            idleShowTimer = setTimeout(() => {
                idleHintForced = false;
                hideIdleHint();
            }, durationMs);
        }

        function forceIdleHint(text, durationMs = 1000) {
            idleHintForced = true;
            clearTimeout(idleHintTimer);
            showIdleHint(text, durationMs);
        }

        function hideIdleHint() {
            if (idleHintForced) return;
            if (!idleHint) return;
            idleHint.classList.remove('visible');
            idleHint.setAttribute('aria-hidden', 'true');
            clearTimeout(idleShowTimer);
            idleShowTimer = setTimeout(() => { if (idleHint) idleHint.style.display = 'none'; }, 700);
        }

        // 空闲提示：鼠标静止 3.61s 后显示，固定 3.7s 后消失；循环重复
        let idleHintExpectedDay = null;
        function scheduleIdleHint() {
            clearTimeout(idleHintTimer);
            if (prefersReducedMotion) return;
            idleHintExpectedDay = TimeState.isDay;
            idleHintTimer = setTimeout(() => {
                // 如果昼夜状态在定时期间发生了切换，就不再显示过期的提示
                if (TimeState.isDay !== idleHintExpectedDay) return;
                const text = TimeState.isDay ? '轻触天空放飞鸟，向下滑动入星河。' : '移动鼠标探索星座';
                showIdleHint(text);
            }, 3610);
        }

        // 鼠标移动时重置空闲计时器，让提示在下一个静止周期再次浮现
        document.addEventListener('mousemove', () => {
            if (idleHintForced) return;
            hideIdleHint();
            scheduleIdleHint();
        });

        // 滚动时立即淡出当前提示并重新计时
        window.addEventListener('scroll', () => {
            if (idleHintForced) return;
            hideIdleHint();
            scheduleIdleHint();
        }, { passive: true });

        scheduleIdleHint();

        // ============================================
        // Canvas 2D 飞鸟 — 水墨写意
        // 像书法的撇捺：有粗细、有浓淡、有弧度转折
        // ============================================
        function drawWingSide(ctx, side, sz, wingSpan, controlY, wingTipY, inkColor, washColor, opacity, shoulderX, detailLevel = 1) {
            const dl = Math.max(0, Math.min(1, detailLevel));

            // 晕染层（随距离淡出）
            if (dl > 0.2) {
                ctx.strokeStyle = washColor;
                ctx.lineWidth = sz * 0.14 * dl;
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.globalAlpha = opacity * (0.6 + 0.4 * dl);
                ctx.beginPath();
                ctx.moveTo(shoulderX, 0);
                ctx.quadraticCurveTo(shoulderX + wingSpan * 0.4 * side, controlY, shoulderX + wingSpan * side, wingTipY);
                ctx.stroke();
            }

            // 主墨层分段（随距离减少段数）
            const segs = Math.max(2, Math.floor(8 * (0.5 + 0.5 * dl)));
            ctx.strokeStyle = inkColor;
            ctx.lineCap = 'round';
            ctx.globalAlpha = opacity;
            for (let i = 0; i < segs; i++) {
                const t1 = i / segs, t2 = (i + 1) / segs;
                const lw = sz * (0.10 - (t1 + t2) * 0.04);
                ctx.lineWidth = lw;
                const mt1 = 1 - t1, mt2 = 1 - t2;
                const x1 = shoulderX + wingSpan * t1 * t1 * side;
                const y1 = 2 * mt1 * t1 * controlY + t1 * t1 * wingTipY;
                const x2 = shoulderX + wingSpan * t2 * t2 * side;
                const y2 = 2 * mt2 * t2 * controlY + t2 * t2 * wingTipY;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }

            // 翅尖羽毛（仅在近处绘制）
            if (sz > 25 && dl > 0.6) {
                ctx.strokeStyle = inkColor;
                ctx.lineWidth = sz * 0.015;
                ctx.globalAlpha = opacity * 0.4 * dl;
                for (let i = 0; i < 3; i++) {
                    const off = (i - 1) * sz * 0.08;
                    ctx.beginPath();
                    ctx.moveTo(shoulderX + wingSpan * 0.85 * side + off, wingTipY * 0.9);
                    ctx.lineTo(shoulderX + wingSpan * 0.95 * side + off, wingTipY * 1.05);
                    ctx.stroke();
                }
            }
        }

        function drawBird(ctx, bird) {
            if (!bird.active || bird.opacity <= 0) return;
            const ease = 1 - Math.pow(1 - Math.min(1, bird.spawnProgress), 3);
            const depthScale = bird.depthScale != null ? bird.depthScale : (1.0 + bird.z / 400);
            const sz = bird.baseSize * ease * depthScale;
            if (sz < 2) return;
            const p = bird.palette;

            let flapRaw = Math.sin(bird.wing);
            let flap = flapRaw > 0 ? Math.pow(flapRaw, 0.7) : -Math.pow(-flapRaw, 1.3);
            flap *= bird.flapIntensity;

            // 远近过渡因子：0 = 完全近景细节，1 = 完全远景剪影
            const farFactor = Math.max(0, Math.min(1, (-bird.z - 80) / 160));
            const detailLevel = 1 - farFactor;

            ctx.save();
            ctx.globalAlpha = bird.opacity;
            ctx.translate(bird.x, bird.y);

            let drawAngle = bird.angle;
            let flipX = 1;
            if (Math.cos(drawAngle) < 0) {
                flipX = -1;
                drawAngle = Math.atan2(Math.sin(drawAngle), -Math.cos(drawAngle));
            }
            ctx.scale(flipX, 1);
            ctx.rotate(drawAngle);

            const inkColor = p.ink;
            const washColor = p.wash;

            // 远景简化轮廓（随 farFactor 渐显）
            if (farFactor > 0) {
                ctx.save();
                ctx.globalAlpha = bird.opacity * farFactor;
                ctx.strokeStyle = inkColor;
                ctx.lineWidth = sz * 0.06;
                ctx.lineCap = 'round';
                const span = sz * 0.7;
                const y = flap * sz * 0.3;
                ctx.beginPath();
                ctx.moveTo(-span, y);
                ctx.lineTo(0, 0);
                ctx.lineTo(span, y);
                ctx.stroke();
                ctx.restore();
            }

            // 近景细节（随 farFactor 渐弱）
            if (detailLevel > 0) {
                ctx.save();
                ctx.globalAlpha = bird.opacity * (0.3 + 0.7 * detailLevel);

                const wingTipY = flap * sz * 0.5;
                const controlY = -sz * 0.15 + flap * sz * 0.18;
                const wingSpan = sz * 1.0;
                const angleOffset = -flap * 0.15 + bird.wingAngle;
                const shoulderR = sz * 0.1 * detailLevel;

                ctx.save();
                ctx.rotate(angleOffset);

                if (shoulderR > 1) {
                    ctx.fillStyle = inkColor;
                    ctx.beginPath();
                    ctx.arc(0, 0, shoulderR, 0, Math.PI * 2);
                    ctx.fill();
                }

                drawWingSide(ctx, -1, sz, wingSpan, controlY, wingTipY, inkColor, washColor, bird.opacity, -shoulderR, detailLevel);
                drawWingSide(ctx, 1, sz, wingSpan, controlY, wingTipY, inkColor, washColor, bird.opacity, shoulderR, detailLevel);

                ctx.restore();
                ctx.restore();
            }

            ctx.restore();
        }

        let _lastFrameTime = performance.now();

        function animate() {
            requestAnimationFrame(animate);
            if (document.hidden) return;
            const time = clock.getElapsedTime();

            // 计算 deltaTime，以 60fps 为基准归一化（dt=1 表示 16.67ms）
            const now = performance.now();
            const rawDt = (now - _lastFrameTime) / 16.667;
            // 限制 dt 范围，防止切标签页回来后跳帧过大
            const dt = Math.min(rawDt, 3);
            _lastFrameTime = now;

            const progress = TimeState.update();

            // 更新太阳动画（仅白天）
            if (TimeState.isDay) {
                updateSunAnimation(dt * 0.016);
            }

            // 更新鼠标位置（用于视差效果）
            updateMousePos();

            // 白天：静态背景保持不变，只在风/落叶覆盖层上绘制动态元素
            if (TimeState.isDay && surroundingsGenerated) {
                windLeafCtx.clearRect(0, 0, windLeafCssW, windLeafCssH);

                // 自动生成风（所有场景）
                if (!prefersReducedMotion) {
                    if (autoSpawn.wind === 0) autoSpawn.wind = now;
                    if (now - autoSpawn.wind >= CONFIG.wind.autoInterval) {
                        autoSpawn.wind = now;
                        if (Math.random() < CONFIG.wind.autoChance && mouseWindTrails.length < CONFIG.wind.maxTrails) {
                            const ww = window.innerWidth;
                            const hh = window.innerHeight;
                            mouseWindTrails.push({
                                cx: Math.random() * ww,
                                cy: hh * 0.2 + Math.random() * hh * 0.6,
                                angle: (Math.random() - 0.5) * 0.5, // 近水平
                                life: 1,
                                dashOffset: 0,
                                style: Math.floor(Math.random() * WIND_PATHS.length)
                            });
                        }
                    }
                }

                // 风在所有场景都渲染
                updateAndDrawWind(windLeafCtx, dt);

                if (lastSurroundingsType === 'trees') {
                    updateAndDrawLeafParticles(windLeafCtx, windLeafCanvas.width / windLeafDpr, windLeafCanvas.height / windLeafDpr, dt);
                }
                drawSurroundingsWithParallax();
            }

            if (!prefersReducedMotion) {
                if (TimeState.isDay) {
                    skyMat.uniforms.uTime.value = time;
                }
            }

            // 天空昼夜过渡直接使用进度值
            // 由于TimeState.sunPosition已经通过对称计算正确反映了太阳位置
            // 天空只需要根据progress（滚动位置）来过渡
            skyMat.uniforms.uDayNight.value = progress;

            // 更新太阳位置uniform，用于方向性天空渐变
            skyMat.uniforms.uSunX.value = TimeState.sunPosition.x;
            skyMat.uniforms.uSunY.value = TimeState.sunPosition.y;

            if (!prefersReducedMotion) {
                // 自动生成鸟儿（仅白天）
                if (TimeState.isDay && birds.length < CONFIG.bird.maxCount) {
                    // 初始化下次生成间隔
                    if (autoSpawn.birdNextInterval === 0) {
                        const bi = CONFIG.bird.autoSpawnInterval;
                        autoSpawn.birdNextInterval = bi.min + Math.random() * (bi.max - bi.min);
                    }
                    // 检查是否到达生成时间
                    if (now - autoSpawn.bird >= autoSpawn.birdNextInterval) {
                        // 按概率生成
                        if (Math.random() < CONFIG.bird.autoSpawnChance) {
                            const w = window.innerWidth;
                            const h = window.innerHeight;
                            // 从屏幕边缘随机位置生成
                            const edge = Math.floor(Math.random() * 4); // 0=上 1=右 2=下 3=左
                            const spawnFns = [
                                { x: () => Math.random() * w, y: () => -50 },
                                { x: () => w + 50, y: () => Math.random() * h },
                                { x: () => Math.random() * w, y: () => h + 50 },
                                { x: () => -50, y: () => Math.random() * h }
                            ];
                            const sfn = spawnFns[edge];
                            const spawnX = sfn.x();
                            const spawnY = sfn.y();
                            addBird({ x: spawnX, y: spawnY }, true);
                        }
                        // 重置计时器和间隔
                        autoSpawn.bird = now;
                        const bi = CONFIG.bird.autoSpawnInterval;
                        autoSpawn.birdNextInterval = bi.min + Math.random() * (bi.max - bi.min);
                    }
                }

                // 竞态修复：帧起始统一 flush 待添加的鸟
                if (TimeState.isDay) {
                    flushPendingBirds();
                } else {
                    pendingBirds.length = 0; // 夜间清空待处理队列
                    autoSpawn.bird = 0;
                    autoSpawn.birdNextInterval = 0;
                }

                // 更新每只鸟，并清理已飞出的鸟（昼夜过渡时允许现有鸟自然淡出，避免瞬间清空）
                for (let i = birds.length - 1; i >= 0; i--) {
                    const bird = birds[i];
                    bird.update(time, dt);
                    if (!bird.active) {
                        bird.dispose();
                        birds.splice(i, 1);
                    }
                }

            }

            maybeSpawnHint();
            drawStars();
            // 始终渲染天空（GPU 开销小，避免夜间残留最后一帧亮色）
            renderer.render(scene, camera);
            // Canvas 2D 鸟儿渲染
            birdsCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
            for (let i = 0; i < birds.length; i++) {
                drawBird(birdsCtx, birds[i]);
            }
        }

        init();
        animate();
    </script>
</body>
</html>
