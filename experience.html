<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experience — Piano</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
  <script>(function(){try{var n=performance.getEntriesByType&&performance.getEntriesByType('navigation')[0];if(n&&n.type==='back_forward')document.documentElement.classList.add('prefers-no-animation');}catch(e){}})();</script>
  <link rel="stylesheet" href="css/styles.css?v=79">
</head>
<body>
  <!-- Portrait Gate -->
  <div class="portrait-gate" aria-hidden="true">
    <div class="portrait-gate-inner">
      <svg class="portrait-gate-icon" viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="22" y="8" width="20" height="48" rx="2.5"/>
        <line x1="28" y1="51" x2="36" y2="51"/>
        <circle cx="32" cy="12.5" r="0.6" fill="currentColor" stroke="none"/>
      </svg>
      <p class="portrait-gate-text-zh">请横屏使用</p>
      <p class="portrait-gate-text-en">Rotate to landscape</p>
    </div>
  </div>

  <!-- Page Transition Overlay -->
  <div class="transition-overlay"></div>

  <!-- Page Header -->
  <header class="page-header">
    <div class="page-header-inner">
      <h1 class="page-title animate-fade-in-up delay-1">Exploration.</h1>
      <nav class="page-nav" aria-label="Primary">
        <a href="index.html">Home</a>
        <a href="portfolio.html">Portfolio</a>
        <a href="experience.html" aria-current="page">Experience</a>
        <a href="about.html">About</a>
      </nav>
    </div>
  </header>

  <!-- Experience Page -->
  <div class="page experience-ariel">
    <div class="container">

      <!-- Hero / Map Section -->
      <section class="hero-section">
        <div class="map-container" id="experience-map">
          <div id="map-wrapper">
            <!-- Journey map SVG -->
            <svg class="world-map" viewBox="0 0 775 570" xmlns="http://www.w3.org/2000/svg">
              <image href="assets/images/ChinaMap.svg" width="775" height="570"/>
              <g id="map-markers"></g>
            </svg>
          </div>
        </div>
      </section>

      <!-- Experience List -->
      <div id="experience-list" class="experience-list"></div>
    </div>

    <p class="page-quote">此心安处，便是吾乡。 —— 苏轼</p>
  </div>

  <script src="js/data.js?v=6"></script>
  <script src="js/transitions.js?v=71"></script>
  <script src="js/nav.js?v=3"></script>

  <script src="js/map.js?v=22"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      window.PianoApp.initTransitions();
      window.PianoApp.initNav();
      try {
        window.PianoApp.initMap();
        console.log('[Piano] initMap completed');
      } catch(e) {
        console.error('[Piano] initMap error:', e);
      }
    });
  </script>
</body>
</html>
